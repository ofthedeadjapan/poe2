<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE2 エンドゲームマップリスト</title>
    <style>
        :root {
            /* =========================
               背景色 (Backgrounds)
            ========================= */
            --bg-body: #1c1917;
            --bg-panel: #292524;
            --bg-table: #292524;
            --bg-th: #44403c;
            --bg-tr-even: #23201e;
            --bg-tr-hover: rgba(203, 166, 95, 0.15);

            /* =========================
               テキスト (Typography)
            ========================= */
            --text-main: #e7e5e4;
            --text-muted: #a8a29e;

            /* =========================
               ボーダー・ライン (Borders & Lines)
            ========================= */
            --border-color: #57534e;
            --separator-color: #78716c;

            /* =========================
               アクセント・UIカラー (Accents & UI)
            ========================= */
            --accent-gold: #cba65f;
            --btn-on: #10b981;
            --btn-sort-active: #60a5fa;

            /* =========================
               耐性ステータスカラー (RGB値)
            ========================= */
            --color-weak: 239, 68, 68;     /* 赤 */
            --color-strong: 234, 179, 8;   /* 黄 */
            --color-normal: 208, 206, 205; /* 灰 */

            /* =========================
               装飾・サイズ (Effects & Radius)
            ========================= */
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --radius-md: 12px;
            --radius-sm: 8px;
            
            /* =========================
               アニメーション (Transitions)
            ========================= */
            --transition-normal: 0.2s ease;
            --transition-bounce: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ==========================================
           基盤設定 (Base & Layout)
        ========================================== */
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px 10px;
            margin: 0;
            line-height: 1.5;
        }

        .content-width {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        button:focus-visible, a:focus-visible, input:focus-visible {
            outline: 2px solid var(--accent-gold);
            outline-offset: 2px;
        }

        /* ==========================================
           ヘッダーエリア (Header)
        ========================================== */
        a.back-link {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
            transition: color var(--transition-normal), transform var(--transition-normal);
        }

        a.back-link:hover {
            color: #fef08a;
            transform: translateX(-4px);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
        }

        .reference-link-top a {
            color: #60a5fa;
            text-decoration: none;
        }

        .reference-link-top a:hover {
            text-decoration: underline;
        }

        /* ==========================================
           コントロールパネル (Controls)
        ========================================== */
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
            background-color: var(--bg-panel);
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        .controls-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            width: 100%;
        }

        .separator-horizontal {
            width: 100%;
            height: 1px;
            background-color: rgba(87, 83, 78, 0.4);
        }

        .separator-strong {
            width: 2px;
            height: 32px;
            background-color: var(--separator-color);
            flex-shrink: 0;
            border-radius: 1px;
        }

        .separator-weak {
            width: 1px;
            height: 26px;
            background-color: rgba(87, 83, 78, 0.6);
            flex-shrink: 0;
        }

        /* ==========================================
           ボタン類 (Buttons)
        ========================================== */
        .btn-action, .btn-dropdown {
            height: 44px;
            box-sizing: border-box;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            transition: all var(--transition-normal);
            outline: none;
        }

        .btn-action:active, .btn-dropdown:active {
            transform: translateY(1px);
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 16px;
            white-space: nowrap;
            flex-shrink: 0;
            background: rgba(180, 120, 40, 0.15);
            border: 1px solid rgba(210, 150, 70, 0.40);
            color: #e8c88a;
        }

        .btn-action:hover {
            background-color: rgba(180, 120, 40, 0.3);
            color: #fff;
            box-shadow: 0 0 10px rgba(210, 150, 70, 0.3);
        }

        /* ==========================================
           ドロップダウン (Dropdown)
        ========================================== */
       .btn-dropdown {
            display: grid;
            grid-template-columns: 24px 1fr 24px;
            align-items: center;
            width: 270px;
            padding: 0 12px;
            background-color: var(--bg-th);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            white-space: nowrap;
        }

        .btn-dropdown:hover {
            background-color: var(--border-color);
            color: #fff;
        }
        
        .btn-left-icon, .dropdown-icon {
            text-align: center;
            font-size: 15px;
        }

        .dropdown-icon {
            font-size: 12px;
            pointer-events: none;
        }

        .btn-label {
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            z-index: 100;
            padding: 8px;
            min-width: 260px;
            box-sizing: border-box;
        }

        .dropdown.show .dropdown-content {
            display: block;
        }
        
        .dropdown-item {
            padding: 10px 16px;
            font-size: 15px;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: var(--radius-sm);
            user-select: none;
            transition: background-color var(--transition-normal);
        }

        .dropdown-item:hover {
            background-color: var(--bg-th);
            color: #ffffff;
        }

        .dropdown-item .checkmark {
            width: 18px;
            font-weight: bold;
            color: var(--btn-on);
            visibility: hidden;
        }

        .dropdown-item.sort-active {
            color: var(--btn-sort-active);
            font-weight: 700;
        }

        .dropdown-item.sort-active .checkmark {
            visibility: visible;
        }
        
        .dropdown-divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 6px 0;
        }

        .action-item {
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* ==========================================
           検索ボックス (Search Box)
        ========================================== */
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            flex-grow: 1;
            max-width: 450px;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            font-size: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            height: 44px;
            padding: 10px 40px 10px 42px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            background-color: rgba(0,0,0,0.2);
            color: white;
            border-radius: var(--radius-sm);
            box-sizing: border-box;
            transition: all var(--transition-normal);
        }

        #searchInput:focus {
            outline: none;
            border-color: #ffffff;
            box-shadow: 0 0 10px 2px rgba(255,255,255,0.2);
        }
        
        .clear-text-btn {
            position: absolute;
            right: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-main);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition-normal);
            visibility: hidden;
            opacity: 0;
        }

        .clear-text-btn:hover {
            background: rgba(255,255,255,0.3);
            color: #fff;
        }

        #searchInput:not(:placeholder-shown) ~ .clear-text-btn {
            visibility: visible;
            opacity: 1;
        }

        .search-counter {
            font-size: 15px;
            font-weight: bold;
            color: var(--accent-gold);
            white-space: nowrap;
        }

        /* ==========================================
           耐性・マークフィルター (Resist & Mark Icons)
        ========================================== */
        .resist-filter-grid {
            display: grid;
            grid-template-columns: repeat(6, 36px);
            grid-template-rows: repeat(3, 36px);
            gap: 8px;
        }

        .mark-filter-grid {
            display: grid;
            grid-auto-flow: column;
            grid-template-rows: 36px;
            gap: 8px;
        }

        .icon-wrapper {
            position: relative;
            width: 36px;
            height: 36px;
            cursor: pointer;
            border-radius: 50%;
            transition: all var(--transition-normal);
        }

        .icon-filter {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            background-color: var(--bg-th);
            object-fit: contain;
            box-sizing: border-box;
            transition: all var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .icon-wrapper:not(.active):hover {
            transform: translateY(-2px);
        }

        .icon-wrapper[data-resist$="Weak"] { --status-color: var(--color-weak); }
        .icon-wrapper[data-resist$="Strong"] { --status-color: var(--color-strong); }
        .icon-wrapper[data-resist]:not([data-resist$="Weak"]):not([data-resist$="Strong"]) { --status-color: var(--color-normal); }

        .icon-wrapper[data-resist] .icon-filter {
            border: 2px solid rgba(var(--status-color), 0.4);
            background-color: rgba(var(--status-color), 0.1);
        }

        .icon-wrapper[data-resist]:hover .icon-filter {
            border-color: rgba(var(--status-color), 0.8);
            background-color: rgba(var(--status-color), 0.2);
        }

        .icon-wrapper.active[data-resist] .icon-filter {
            border-color: rgb(var(--status-color));
            box-shadow: 0 0 10px rgba(var(--status-color), 0.6);
            background-color: rgba(var(--status-color), 0.3);
        }

        .icon-wrapper[data-mark] .icon-filter {
            border: 2px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(255, 255, 255, 0.05);
            opacity: 0.25;
            filter: grayscale(100%);
        }

        .icon-wrapper[data-mark]:hover .icon-filter {
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.1);
            opacity: 0.8;
            filter: grayscale(50%);
        }

        .icon-wrapper.active[data-mark] .icon-filter {
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(203, 166, 95, 0.6);
            background-color: rgba(203, 166, 95, 0.2);
            opacity: 1;
            filter: grayscale(0%);
        }

        .badge-check {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background-color: var(--btn-on);
            color: #fff;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            border: 2px solid var(--bg-panel);
            opacity: 0;
            transform: scale(0.5);
            transition: all var(--transition-bounce);
        }

        .icon-wrapper.active .badge-check {
            opacity: 1;
            transform: scale(1);
        }

        .icon-dummy {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--border-color);
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }

        .resist-filter-grid.has-active .icon-wrapper:not(.active) {
            opacity: 0.35;
            filter: grayscale(50%);
        }
        .resist-filter-grid.has-active .icon-wrapper:not(.active):hover {
            opacity: 0.8;
        }

        /* ==========================================
           テーブル全体 (Table Settings)
        ========================================== */
        .table-wrapper {
            border-radius: var(--radius-md);
            overflow: hidden;
            background-color: var(--bg-table);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        .table-wrapper::-webkit-scrollbar { height: 8px; }
        .table-wrapper::-webkit-scrollbar-track { background: var(--bg-body); }
        .table-wrapper::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        .table-wrapper::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            font-size: 14px;
            table-layout: fixed;
        }
        
        th, td {
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            padding: 8px 10px;
            line-height: 2.0;
            min-width: 6em;
            word-break: break-word; 
            overflow-wrap: break-word; 
            white-space: pre-wrap;
        }

        th:last-child, td:last-child { border-right: none; }
        tr:last-child td { border-bottom: none; }

        th {
            background-color: var(--bg-th);
            color: #ffffff;
            white-space: nowrap;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 1px 0 var(--border-color);
        }

        td { text-align: left; }
        
        tr { transition: background-color var(--transition-normal); }
        tr td.first-visible-cell { transition: box-shadow var(--transition-normal); }
        tr.row-even { background-color: var(--bg-tr-even); }
        
        tr:not(.no-hover-row):hover { background-color: var(--bg-tr-hover); }
        tr:not(.no-hover-row):hover td.first-visible-cell { box-shadow: inset 4px 0 0 var(--accent-gold); }

        .is-hidden { display: none !important; }
        
        .msg-container {
            text-align: center;
            padding: 48px 20px;
            font-weight: 700;
            font-size: 18px;
            color: var(--text-muted);
            white-space: normal;
        }

        /* ==========================================
           テーブル内の個別列設定 (Table Columns)
        ========================================== */
        .col-resist-icon {
            width: 180px;
            min-width: 180px;
            max-width: 180px;
            text-align: center;
            white-space: normal;
        }
        
        .col-mark {
            width: 60px;
            min-width: 60px;
            max-width: 60px;
            text-align: center;
        }

        .resist-row-inline {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            width: 100%;
            gap: 2px;
            margin-bottom: 2px;
        }

        .icon-img, .icon-text {
            display: inline-block;
            width: 24px;
            height: 24px;
            margin: 2px;
            vertical-align: middle;
            border-radius: 50%;
        }

        .icon-text {
            line-height: 24px;
            text-align: center;
            color: var(--text-muted);
            font-weight: bold;
            font-size: 14px;
        }

        .icon-img[title$="Weak"] { --table-status-color: var(--color-weak); }
        .icon-img[title$="Strong"] { --table-status-color: var(--color-strong); }
        .icon-img[title]:not([title$="Weak"]):not([title$="Strong"]) { --table-status-color: var(--color-normal); }

        .icon-img {
            object-fit: contain;
            padding: 0;
            background-color: rgba(var(--table-status-color), 0.15);
            box-shadow: 0 0 0 2px rgba(var(--table-status-color), 0.5), 0 1px 2px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-normal); 
        }

        .icon-img:hover {
            box-shadow: 0 0 0 2px rgb(var(--table-status-color)), 0 0 8px rgba(var(--table-status-color), 0.6);
            background-color: rgba(var(--table-status-color), 0.3);
            transform: translateY(-1px);
        }

        .mark-btn-table {
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            transition: all var(--transition-normal);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 2px;
            
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(255, 255, 255, 0.05);
            opacity: 0.25;
            filter: grayscale(100%);
            box-sizing: border-box;
        }

        .mark-btn-table:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.1);
            opacity: 0.25;
            filter: grayscale(25%);
            transform: scale(1.1);
        }

        .mark-btn-table.active {
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(203, 166, 95, 0.6);
            background-color: rgba(203, 166, 95, 0.2);
            opacity: 1;
            filter: grayscale(0%);
        }

        /* ==========================================
           モーダル (Modal)
        ========================================== */
        .modal-overlay {
            position: fixed;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            background: rgba(0, 0, 0, 0.8);

            z-index: 1000;

            opacity: 0;
            visibility: hidden;
            pointer-events: none;

            transition:
                opacity var(--transition-normal),
                visibility 0s linear var(--transition-normal);
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;

            transition: opacity var(--transition-normal);
        }

        .modal-content {
            position: relative;

            max-width: 90vw;
            max-height: 90vh;

            padding: 12px;

            background: var(--bg-panel);

            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .modal-image {
            display: block;

            max-width: 100%;
            max-height: calc(90vh - 24px);

            border-radius: var(--radius-sm);

            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 8px;
            right: 8px;

            width: 36px;
            height: 36px;

            display: flex;
            align-items: center;
            justify-content: center;

            border: none;
            border-radius: 50%;

            background: rgba(0, 0, 0, 0.7);

            color: #fff;
            font-size: 18px;

            cursor: pointer;
        }

        .boss-link {
            color: var(--accent-gold);

            text-decoration: underline;
            text-underline-offset: 3px;

            cursor: pointer;

            white-space: pre-line;

            transition: color var(--transition-normal);
        }

        .boss-link:hover {
            color: #fef08a;
        }

        /* ==========================================
           レスポンシブ・スマホ最適化 (Mobile)
        ========================================== */
        @media (max-width: 900px) {
            table { table-layout: auto; }
            .controls-row { flex-direction: column; align-items: stretch; gap: 12px; }
            .separator-strong, .separator-weak, .separator-horizontal { display: none; }
            .search-wrapper { max-width: 100%; width: 100%; min-width: 0; }
            .search-counter { width: 100%; text-align: center; }
            .btn-dropdown, .btn-action, .dropdown { width: 100%; min-width: 0; }
            .dropdown-content { min-width: 100%; box-sizing: border-box; }
            .resist-filter-grid, .mark-filter-grid { justify-content: center; }
            .table-wrapper { overflow-x: auto; }
            th { white-space: normal; }
            table { font-size: 12px; }
            th, td { padding: 4px 6px; }
            .col-resist-icon { min-width: 110px; max-width: 150px; }
            .col-mark { min-width: 50px; max-width: 50px; }
            .resist-row-inline { flex-wrap: wrap; }
            
            #btn-clear-filters { order: 1; }
            #resist-grid { order: 2; }
            #mark-grid { order: 3; } 
            #search-wrap { order: 4; }
            #search-counter { order: 5; }
        }
    </style>
</head>

    <div class="controls-wrapper content-width">
        <div class="controls-row">
            <button type="button" class="btn-action" data-click="resetView">↺ ソート・表示項目の初期化</button>
            
            <div class="separator-strong"></div>
            
            <div class="dropdown">
                <button type="button" class="btn-dropdown">
                    <span class="btn-left-icon">↕</span>
                    <span id="btn-sort-text" class="btn-label">マップ名ソート: 初期順</span>
                    <span class="dropdown-icon">▼</span>
                </button>
                <div class="dropdown-content">
                    <div class="dropdown-item sort-active" data-click="sort" data-sort="default" data-sort-name="初期順"><span class="checkmark" style="visibility:visible;">✔</span>初期順</div>
                    <div class="dropdown-item" data-click="sort" data-sort="kana-asc" data-sort-name="五十音順"><span class="checkmark">✔</span>五十音順</div>
                    <div class="dropdown-item" data-click="sort" data-sort="kana-desc" data-sort-name="五十音逆順"><span class="checkmark">✔</span>五十音逆順</div>
                    <div class="dropdown-item" data-click="sort" data-sort="eng-asc" data-sort-name="英語順"><span class="checkmark">✔</span>英語順</div>
                    <div class="dropdown-item" data-click="sort" data-sort="eng-desc" data-sort-name="英語逆順"><span class="checkmark">✔</span>英語逆順</div>
                </div>
            </div>

            <div class="separator-weak"></div>

            <div class="dropdown">
                <button type="button" class="btn-dropdown">
                    <span class="btn-left-icon">⊞</span>
                    <span id="btn-column-text" class="btn-label">表示項目</span>
                    <span class="dropdown-icon">▼</span>
                </button>
                <div class="dropdown-content" id="column-dropdown-content">
                    <div class="dropdown-item action-item" data-click="setAllColumns" data-visible="true">☑ すべて表示</div>
                    <div class="dropdown-item action-item" data-click="setAllColumns" data-visible="false">☐ すべて非表示</div>
                    <div class="dropdown-divider"></div>
                </div>
            </div>
        </div>

        <div class="separator-horizontal"></div>

        <div class="controls-row">
            <button type="button" class="btn-action" data-click="clearAllFilters" id="btn-clear-filters">✖ 検索・フィルターの全解除</button>
            
            <div class="separator-strong"></div>

            <div class="search-wrapper" id="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="読み込み中..." disabled autocomplete="off">
                <button type="button" class="clear-text-btn" data-click="clearSearchText" aria-label="検索文字を消去" title="文字を消去">✖</button>
            </div>

            <div class="separator-weak"></div>

            <div class="resist-filter-grid" id="resist-grid"></div>

            <div class="separator-weak"></div>

            <div class="mark-filter-grid" id="mark-grid"></div>

            <div class="separator-weak"></div>

            <div id="search-counter" class="search-counter">検索結果: -件 / 全-件</div>
        </div>
    </div>

    <div class="table-wrapper content-width">
        <table id="boss-table">
            <thead>
                <tr id="boss-table-head-row"></tr>
            </thead>
            <tbody id="boss-table-body">
            </tbody>
        </table>
    </div>

    <div id="boss-modal" class="modal-overlay">
        <div class="modal-content">
            <button type="button" class="modal-close" data-click="closeModal" aria-label="閉じる">✕</button>
            <img id="boss-modal-img" src="" alt="ボス画像" class="modal-image" loading="lazy">
        </div>
    </div>

    <script src="js/wanakana.min.js" defer></script>

    <script>
        // ==========================================
        // 1. 定数・定義 (Constants & Definitions)
        // ==========================================

        const STORAGE_VERSION = 1;
        
        const STORAGE_KEYS = {
            USER_STATE: 'poe2:userState'
        };

        const MARK_DEFINITIONS = {
            skull: { icon: '💀', title: '強敵' }
        };

        const RESIST_TYPES = ['Armour', 'Evasion', 'Fire', 'Cold', 'Lightning', 'Chaos'];

        const DUMMY_RESISTS = new Set([
            'ArmourWeak',
            'EvasionWeak',
            'ChaosWeak'
        ]);

        const COLUMN_DEFINITIONS = [
            { id: 'よみがな', className: 'text-normal', label: 'よみがな', defaultVisible: false, isSearchable: true, type: 'text' },
            { id: 'マップ日本語', className: 'text-normal', label: 'マップ日本語', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: 'ボス日本語', className: 'text-normal', label: 'ボス日本語', defaultVisible: true, isSearchable: true, type: 'bossText' },
            { id: 'マップ英語', className: 'text-normal', label: 'マップ英語', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: 'ボス英語', className: 'text-normal', label: 'ボス英語', defaultVisible: true, isSearchable: true, type: 'bossText' },
            { id: '耐性アイコン', className: 'resist-icon', label: '耐性アイコン', defaultVisible: true, isSearchable: false, type: 'resistIcon' },
            { 
                id: '元ボスアクト/エリア', 
                className: 'text-normal',
                label: '元ボスアクト/エリア', 
                defaultVisible: true, 
                isSearchable: true, 
                searchKeys: ['元ボスアクト', '元ボスエリア'],
                type: 'custom', 
                render: (item) => {
                    const act = item.data['元ボスアクト'] ? `${item.data['元ボスアクト']}章` : '';
                    const area = item.data['元ボスエリア'] || '';
                    return [act, area].filter(Boolean).join('\n');
                }
            },
            { id: '元ボス名', className: 'text-normal', label: '元ボス名', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: '元ボス特徴', className: 'text-normal', label: '元ボス特徴', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: 'メモ', className: 'text-normal', label: 'メモ', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: 'マーク', className: 'mark', label: 'マーク', defaultVisible: true, isSearchable: false, type: 'mark' }
        ];

        // ==========================================
        // 2. 基盤サービス (Storage & Persistence)
        // ==========================================

        const StorageService = {
            load(key, fallback = null) {
                try {
                    const saved = localStorage.getItem(key);
                    return saved ? JSON.parse(saved) : fallback;
                } catch (e) {
                    console.warn(`StorageService: 壊れたデータを削除しました [${key}]`, e);
                    this.remove(key);
                    return fallback;
                }
            },
            save(key, data) {
                try {
                    localStorage.setItem(key, JSON.stringify(data));
                } catch (e) {
                    console.warn(`StorageService: データの保存に失敗しました [${key}]`, e);
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(key);
                } catch (e) {
                    console.warn(`StorageService: データの削除に失敗しました [${key}]`, e);
                }
            }
        };

        const UserStateService = {
            createDefaultColumns() {
                return Object.fromEntries(
                    COLUMN_DEFINITIONS.map(col => [col.id, col.defaultVisible])
                );
            },

            normalizeColumns(savedColumns = {}) {
                const defaults = this.createDefaultColumns();
                return Object.fromEntries(
                    Object.keys(defaults).map(key => [
                        key,
                        savedColumns[key] ?? defaults[key]
                    ])
                );
            },

            load() {
                const saved = StorageService.load(STORAGE_KEYS.USER_STATE, null);

                const validMarkKeys = new Set(Object.keys(MARK_DEFINITIONS));
                const validatedMarks = {};

                if (saved && saved.version === STORAGE_VERSION) {
                    for (const [id, marks] of Object.entries(saved.marks || {})) {
                        if (!Array.isArray(marks)) continue;
                        const filtered = marks.filter(mark => validMarkKeys.has(mark));
                        if (filtered.length > 0) {
                            validatedMarks[id] = filtered;
                        }
                    }
                }

                const normalizedColumns = this.normalizeColumns(saved?.columns || {});

                return {
                    version: STORAGE_VERSION,
                    marks: validatedMarks,
                    columns: normalizedColumns
                };
            },

            save() {
                StorageService.save(STORAGE_KEYS.USER_STATE, AppState.user);
            }
        };

        const PersistenceService = {
            timer: null,
            delay: 300,

            scheduleSave() {
                clearTimeout(this.timer);
                this.timer = setTimeout(() => {
                    this.flush();
                }, this.delay);
            },

            flush() {
                if (this.timer) {
                    clearTimeout(this.timer);
                    this.timer = null;
                }
                UserStateService.save();
            }
        };

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                PersistenceService.flush();
            }
        });
        window.addEventListener('pagehide', () => PersistenceService.flush());

        // ==========================================
        // 3. 状態管理 (State & DOM Cache)
        // ==========================================

        const AppState = {
            data: {
                items: [],
                itemMap: new Map() 
            },
            ui: {
                currentSort: 'default'
            },
            filters: {
                text: '',
                resists: new Set(),
                marks: new Set() 
            },
            stats: {
                visibleCount: 0,
                hasVisibleColumn: true
            },
            user: null 
        };

        const ViewStore = {
            rows: new Map(),           
            columns: new Map(),        
            headers: new Map(),        
            columnMenuItems: new Map() 
        };

        const DOM = {
            initCache() {
                const map = {
                    searchInput: 'searchInput',
                    searchCounter: 'search-counter',
                    resistGrid: 'resist-grid',
                    markGrid: 'mark-grid',
                    btnSortText: 'btn-sort-text',
                    btnColumnText: 'btn-column-text',
                    tbody: 'boss-table-body',
                    fallbackMessage: 'fallback-message',
                    fatalErrorMessage: 'fatal-error-message',
                    bossModal: 'boss-modal',
                    bossModalImg: 'boss-modal-img'
                };
            
                Object.entries(map).forEach(([prop, id]) => {
                    this[prop] = document.getElementById(id);
                });
            },
            showFatalError(msg) {
                if (this.fatalErrorMessage) {
                    this.fatalErrorMessage.textContent = "致命的なエラーが発生しました: " + msg;
                    this.fatalErrorMessage.classList.remove('is-hidden');
                }
            }
        };

        // ==========================================
        // 4. RenderCoordinator (調停役)
        // ==========================================
        const RenderCoordinator = {
            refreshAll() {
                FilterService.apply();
                TableRenderer.updateTableState();
                FooterRenderer.updateFooter();
            },
            refreshColumns() {
                ColumnRenderer.updateButtonUI();
                COLUMN_DEFINITIONS.forEach(def => {
                    ColumnRenderer.updateColumnVisibility(def.id, AppState.user.columns[def.id]);
                });
                ColumnRenderer.updateFirstVisibleCol();
                this.refreshAll();
            },
            refreshFilters() {
                FilterUIRenderer.updateResistUI();
                FilterUIRenderer.updateMarkUI();
                this.refreshAll();
            },
            refreshSort() {
                TableRenderer.reorderRows();
                TableRenderer.updateTableState();
            }
        };

        // ==========================================
        // 5. コントローラー層 (Controllers)
        // ==========================================

        const MarkController = {
            toggleRowMark(itemId, markType, btnElement) {
                const item = AppState.data.itemMap.get(itemId);
                if (!item) return;

                const marks = item.user.marks;
                if (marks.has(markType)) {
                    marks.delete(markType);
                } else {
                    marks.add(markType);
                }

                AppState.user.marks[itemId] = [...marks];
                if (marks.size === 0) {
                    delete AppState.user.marks[itemId];
                }

                PersistenceService.scheduleSave();

                if (btnElement) {
                    TableRenderer.updateRowMarkUI(btnElement, marks.has(markType));
                }

                if (AppState.filters.marks.has(markType)) {
                    RenderCoordinator.refreshAll();
                }
            }
        };

        const ColumnController = {
            toggleVisibility(columnId) {
                const currentVisible = AppState.user.columns[columnId];
                AppState.user.columns[columnId] = !currentVisible;
                PersistenceService.scheduleSave();
                RenderCoordinator.refreshColumns();
            },

            setAllVisibility(visible) {
                Object.keys(AppState.user.columns).forEach(k => {
                    AppState.user.columns[k] = visible;
                });
                PersistenceService.scheduleSave();
                RenderCoordinator.refreshColumns();
            }
        };

        const SortController = {
            apply(mode, textName) {
                AppState.ui.currentSort = mode;
                
                document.querySelectorAll('[data-sort]').forEach(item => item.classList.remove('sort-active'));
                document.querySelector(`[data-sort="${mode}"]`)?.classList.add('sort-active');
                
                document.querySelectorAll('[data-sort] .checkmark').forEach(cm => cm.style.visibility = 'hidden');
                const activeCheckmark = document.querySelector(`[data-sort="${mode}"] .checkmark`);
                if (activeCheckmark) activeCheckmark.style.visibility = 'visible';

                if (textName) DOM.btnSortText.innerText = `マップ名ソート: ${textName}`;

                if (SORTERS[mode]) AppState.data.items.sort(SORTERS[mode]);
                
                RenderCoordinator.refreshSort();
            }
        };

        const SearchController = {
            updateText(rawText) {
                AppState.filters.text = rawText;
                RenderCoordinator.refreshAll();
            },

            clearText(skipFilter = false) {
                DOM.searchInput.value = '';
                AppState.filters.text = '';
                if (!skipFilter) {
                    RenderCoordinator.refreshAll();
                    DOM.searchInput.focus();
                }
            },

            toggleResist(resist) {
                if (AppState.filters.resists.has(resist)) {
                    AppState.filters.resists.delete(resist);
                } else {
                    AppState.filters.resists.add(resist);
                }
                RenderCoordinator.refreshFilters();
            },

            toggleMark(mark) {
                if (AppState.filters.marks.has(mark)) {
                    AppState.filters.marks.delete(mark);
                } else {
                    AppState.filters.marks.add(mark);
                }
                RenderCoordinator.refreshFilters();
            },

            clearAllFilters() {
                this.clearText(true); 
                AppState.filters.resists.clear();
                AppState.filters.marks.clear();
                RenderCoordinator.refreshFilters();
            }
        };

        const AppController = {
            resetView() {
                SortController.apply('default', '初期順');
            
                const defaults = UserStateService.createDefaultColumns();
                Object.keys(AppState.user.columns).forEach(k => {
                    AppState.user.columns[k] = defaults[k];
                });
                
                PersistenceService.scheduleSave();
                RenderCoordinator.refreshColumns();
                SearchController.clearAllFilters();
            }
        };
        // ==========================================
        // 6. イベント委譲 (Event Delegation)
        // ==========================================

        const CLICK_ACTIONS = {
            resetView: () => AppController.resetView(),
            clearAllFilters: () => SearchController.clearAllFilters(),
            clearSearchText: () => SearchController.clearText(),
            sort: el => SortController.apply(el.dataset.sort, el.dataset.sortName),
            toggleColumn: el => ColumnController.toggleVisibility(el.dataset.column),
            setAllColumns: el => ColumnController.setAllVisibility(el.dataset.visible === 'true'),
            toggleResist: el => SearchController.toggleResist(el.dataset.resist),
            toggleMark: el => SearchController.toggleMark(el.dataset.mark),
            toggleRowMark: el => MarkController.toggleRowMark(el.dataset.mapKey, el.dataset.markType, el),
            showModal: el => {
                DOM.bossModalImg.src = el.dataset.imgSrc;
                DOM.bossModal.classList.add('show');
                document.body.style.overflow = 'hidden';
            },
            closeModal: () => {
                DOM.bossModal.classList.remove('show');
                document.body.style.overflow = '';
                setTimeout(() => {
                    DOM.bossModalImg.src = '';
                }, 200);
            }
        };

        function setupEventListeners() {
            let searchTimer;
            DOM.searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    SearchController.updateText(normalizeText(e.target.value));
                }, 150); 
            });

            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f') {
                    if (DOM.searchInput && !DOM.searchInput.disabled) {
                        e.preventDefault();
                        DOM.searchInput.focus();
                        DOM.searchInput.select(); 
                    }
                }
                
                // ESCキーでモーダルを閉じる
                if (e.key === 'Escape' && DOM.bossModal.classList.contains('show')) {
                    CLICK_ACTIONS.closeModal();
                }
            });

            document.addEventListener('click', e => {
                // 背景クリック時のみモーダルを閉じる
                if (e.target === DOM.bossModal) {
                    CLICK_ACTIONS.closeModal();
                    return;
                }

                handleDropdownClick(e);

                const el = e.target.closest('[data-click]');
                if (!el) return;

                CLICK_ACTIONS[el.dataset.click]?.(el);
            });
        }

        function handleDropdownClick(e) {
            const dropdownBtn = e.target.closest('.btn-dropdown');
            const isInsideDropdownContent = e.target.closest('.dropdown-content');
            if (isInsideDropdownContent) return;

            const openDropdowns = document.querySelectorAll('.dropdown.show');

            if (!dropdownBtn) {
                openDropdowns.forEach(d => d.classList.remove('show'));
                return;
            }

            const parent = dropdownBtn.parentElement;
            const wasOpen = parent.classList.contains('show');
            openDropdowns.forEach(d => d.classList.remove('show'));

            if (!wasOpen) parent.classList.add('show');
        }

        // ==========================================
        // 7. ユーティリティとファクトリ
        // ==========================================

        const ROMAJI_TO_KANA_REGEX = {
            'a': '[あぁ]', 'i': '[いぃ]', 'u': '[うぅ]', 'e': '[えぇ]', 'o': '[おぉ]',
            'k': '[かきくけこきゃきゅきょっ]', 'ky': '[きゃきゅきょっ]', 
            's': '[さしすせそしゃしゅしょっ]', 'sh': '[しゃしゅしょしっ]', 'sy': '[しゃしゅしょっ]',
            't': '[たちつてとちゃちゅちょっ]', 'c': '[かきくけこさしすせそちゃちゅちょっ]', 'ch': '[ちゃちゅちょちっ]', 'ty': '[ちゃちゅちょっ]', 'cy': '[ちゃちゅちょっ]',
            'ts': '[つっ]', 
            'n': '[なにぬねのんにゃにゅにょっ]', 'ny': '[にゃにゅにょっ]',
            'h': '[はひふへほひゃひゅひょっ]', 'hy': '[ひゃひゅひょっ]',
            'f': '[ふぁふぃふふぇふぉっ]', 'fy': '[ふゃふゅふょっ]',
            'm': '[まみむめもみゃみゅみょっ]', 'my': '[みゃみゅみょっ]',
            'y': '[やゆよゃゅょっ]',
            'r': '[らりるれろりゃりゅりょっ]', 'ry': '[りゃりゅりょっ]',
            'w': '[わうをんっ]', 
            'g': '[がぎぐげごぎゃぎゅぎょっ]', 'gy': '[ぎゃぎゅぎょっ]',
            'z': '[ざじずぜぞじゃじゅじょっ]', 'j': '[じゃじゅじょじっ]', 'zy': '[じゃじゅじょっ]', 'jy': '[じゃじゅじょっ]',
            'd': '[だぢづでどっ]', 'dy': '[ぢゃぢゅぢょっ]',
            'b': '[ばびぶべぼびゃびゅびょっ]', 'by': '[びゃびゅびょっ]',
            'p': '[ぱぴぷぺぽぴゃぴゅぴょっ]', 'py': '[ぴゃぴゅぴょっ]',
            'v': '[ゔぁゔぃゔゔぇゔぉっ]', 'vy': '[ゔゃゔゅゔょっ]',
            'q': '[くぁくぃくくぇくぉっ]', 
            'x': '[ぁぃぅぇぉっゃゅょ]', 'l': '[ぁぃぅぇぉっゃゅょ]'
        };

        const JA_COLLATOR = new Intl.Collator('ja', { numeric: true });
        const EN_COLLATOR = new Intl.Collator('en', { numeric: true });

        const SORTERS = {
            'default': (a, b) => a.cache.defaultOrder - b.cache.defaultOrder,
            'kana-asc': (a, b) => JA_COLLATOR.compare(a.data["よみがな"] || '', b.data["よみがな"] || '') || a.cache.defaultOrder - b.cache.defaultOrder,
            'kana-desc': (a, b) => JA_COLLATOR.compare(b.data["よみがな"] || '', a.data["よみがな"] || '') || a.cache.defaultOrder - b.cache.defaultOrder,
            'eng-asc': (a, b) => EN_COLLATOR.compare(a.data["マップ英語"] || '', b.data["マップ英語"] || '') || a.cache.defaultOrder - b.cache.defaultOrder,
            'eng-desc': (a, b) => EN_COLLATOR.compare(b.data["マップ英語"] || '', a.data["マップ英語"] || '') || a.cache.defaultOrder - b.cache.defaultOrder
        };

        function normalizeText(str) { 
            if (!str) return '';
            return String(str).normalize('NFKC').replace(/[\u30a1-\u30f6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60)).toLowerCase(); 
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function getIconPath(key) {
            const fileName = key.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
            return `images/icon-enemies/${fileName}.webp`;
        }

        const ItemFactory = {
            createSearchIndex(item, searchIndexKeys) {
                return searchIndexKeys
                    .map(k => normalizeText(item[k]))
                    .filter(Boolean)
                    .join('\t');
            },

            createResistIndex(item) {
                return new Set(
                    String(item.耐性アイコン || '-').replace(/\r\n/g, '\n').split(/[\n,]+/).map(r => r.trim()).filter(r => r && r !== '-')
                );
            },

            createEnhancedItem(item, idx, searchIndexKeys) {
                const savedMarks = AppState.user.marks[item.id] || [];

                return {
                    id: item.id,
                    data: { ...item },
                    user: {
                        marks: new Set(savedMarks)
                    },
                    cache: {
                        defaultOrder: idx, 
                        searchIndex: this.createSearchIndex(item, searchIndexKeys), 
                        resistIndex: this.createResistIndex(item), 
                        kanaIndex: normalizeText(item.よみがな)
                    },
                    view: { 
                        visible: true,      
                        lastVisible: undefined,
                        lastIsEven: undefined
                    }
                };
            },

            buildItems(rawData) {
                const searchIndexKeys = [];
                COLUMN_DEFINITIONS.filter(d => d.isSearchable).forEach(d => {
                    if (d.searchKeys) searchIndexKeys.push(...d.searchKeys);
                    else searchIndexKeys.push(d.id);
                });

                return rawData.map((item, idx) => this.createEnhancedItem(item, idx, searchIndexKeys));
            }
        };

        // ==========================================
        // 8. アプリ初期化
        // ==========================================

        const App = {
            async init() {
                try {
                    DOM.initCache();
                    AppState.user = UserStateService.load();
                    setupDynamicUI();
                    initializeWanakana();
                    setupEventListeners();
                    await this.loadData();
                } catch (e) {
                    console.error("Initialization Failed:", e);
                    DOM.showFatalError(e.message);
                }
            },

            async loadData() {
                try {
                    const response = await fetch('poe2_endgame_maps.json');
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    this.validateAndInitialize(data);
                } catch (e) {
                    console.warn("JSONデータの読み込みに失敗しました。動作確認用のダミーデータを表示します。", e);
                    DOM.fallbackMessage.classList.remove('is-hidden');
                    const dummyData = [
                        { "id": "map_001", "よみがな": "だみーまっぷ", "マップ日本語": "ダミーマップ", "ボス日本語": "ダミーボス", "マップ英語": "DummyMap", "ボス英語": "DummyBoss", "耐性アイコン": "", "元ボスアクト": "元ダミーアクト", "元ボスエリア": "元ダミーエリア", "元ボス名": "元ダミーボス", "元ボス特徴": "ダミー", "メモ": "ダミーメモ", "bossimage": "images/bosses/dummyboss.webp" },
            { "id": "map_002", "よみがな": "だみーさばんな", "マップ日本語": "ダミーサバンナ", "ボス日本語": "ハイエナロード、カエドロン", "マップ英語": "Savannah", "ボス英語": "Caedron, the Hyena Lord", "耐性アイコン": "FireWeak,Cold", "元ボスアクト": "２", "元ボスエリア": "ヴァスティリ郊外", "元ボス名": "ラスブレイカー", "元ボス特徴": "獣一杯、槍一杯", "bossimage": "" },
                        { "id": "map_003", "よみがな": "だみーひすいのしま", "マップ日本語": "ダミーヒスイの島", "ボス日本語": "選ばれし者、マノキ\n熱病に侵されし者、マノキ\n冒督されし者、マノキ", "マップ英語": "The Jade Isles", "ボス英語": "Manoki, the Chosen\nManoki, the Fevered\nManoki, the Defiled", "耐性アイコン": "FireWeak,ColdWeak,LightningWeak\nArmour,Evasion,Fire,Cold,Lightning,Chaos\nArmourStrong,EvasionStrong,FireStrong,ColdStrong,LightningStrong,ChaosStrong", "元ボスアクト": "４", "元ボスエリア": "部族の中心", "元ボス名": "族長、タヴァカイ\n堕ちたタヴァカイ\n蝕まれたタヴァカイ", "元ボス特徴": "4章ボス", "メモ": "", "bossimage": "images/bosses/tavakai-the-chieftain.webp\nimages/bosses/tavakai-the-fallen.webp\nimages/bosses/tavakai-the-consumed.webp" },
                    ];
                    this.validateAndInitialize(dummyData);
                }
            },

            validateAndInitialize(data) {
                const idSet = new Set();
                data.forEach((item, idx) => {
                    if (!item.id) throw new Error(`Data is missing 'id' at index ${idx}`);
                    if (idSet.has(item.id)) throw new Error(`Duplicate id found: ${item.id}`);
                    idSet.add(item.id);
                });

                const items = ItemFactory.buildItems(data);

                items.forEach(item => {
                    AppState.data.items.push(item);
                    AppState.data.itemMap.set(item.id, item);
                });

                TableRenderer.buildTable();
                RenderCoordinator.refreshColumns();
                RenderCoordinator.refreshAll();
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });

        function initializeWanakana() {
            const enableSearch = () => {
                DOM.searchInput.disabled = false;
                DOM.searchInput.placeholder = "マップ名やボス名で検索...";
            };

            if (typeof wanakana !== 'undefined') {
                enableSearch();
            } else {
                const script = document.querySelector('script[src*="wanakana"]');
                if (script) {
                    script.addEventListener('load', enableSearch);
                    script.addEventListener('error', () => {
                        console.warn("wanakana.jsの読み込みに失敗しました");
                        DOM.searchInput.placeholder = "ローマ字検索が無効です";
                        DOM.searchInput.disabled = false;
                    });
                }
            }
        }

        // ==========================================
        // 9. UI構築 (Views)
        // ==========================================

        const UIFactory = {
            createMenuItem({ dataset = {}, text, checked = false }) {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                Object.assign(div.dataset, dataset);

                div.innerHTML = `
                    <span class="checkmark" style="visibility:${checked ? 'visible' : 'hidden'}">✔</span>
                    ${text}
                `;
                return div;
            },

            createFilterButton({ dataset = {}, title = '', iconType = 'text', iconValue = '', isDummy = false }) {
                const wrapper = document.createElement('div');
                wrapper.className = isDummy ? 'icon-dummy' : 'icon-wrapper';
                Object.assign(wrapper.dataset, dataset);
                wrapper.title = title;

                if (isDummy) {
                    wrapper.textContent = '-';
                    return wrapper;
                }

                wrapper.innerHTML = `
                    ${iconType === 'image' 
                        ? `<img src="${iconValue}" class="icon-filter" alt="${title}">` 
                        : `<span class="icon-filter">${iconValue}</span>`
                    }
                    <div class="badge-check">✔</div>
                `;
                return wrapper;
            }
        };

        function setupDynamicUI() {
            buildTableHeader();
            buildColumnMenu();
            buildResistFilter();
            buildMarkFilter();
        }

        function buildTableHeader() {
            const headerRow = document.getElementById('boss-table-head-row');
            COLUMN_DEFINITIONS.forEach(def => {
                const th = document.createElement('th');
                th.className = `col-${def.className}`; 
                th.dataset.key = def.id;
                th.textContent = def.label;
                headerRow.appendChild(th);
                
                ViewStore.headers.set(def.id, th);
            });
        }

        function buildColumnMenu() {
            const colDropdown = document.getElementById('column-dropdown-content');
            COLUMN_DEFINITIONS.forEach(def => {
                const item = UIFactory.createMenuItem({
                    dataset: { click: 'toggleColumn', column: def.id },
                    text: def.label,
                    checked: AppState.user.columns[def.id]
                });
                
                colDropdown.insertBefore(item, colDropdown.lastElementChild);
                ViewStore.columnMenuItems.set(def.id, item);
            });
        }

        function buildResistFilter() {
            const suffixes = ['Weak', '', 'Strong'];
            const fragment = document.createDocumentFragment();

            suffixes.forEach(suffix => {
                RESIST_TYPES.forEach(type => {
                    const key = `${type}${suffix}`;
                    fragment.appendChild(
                        UIFactory.createFilterButton({
                            dataset: { click: 'toggleResist', resist: key },
                            title: key,
                            iconType: 'image',
                            iconValue: getIconPath(key),
                            isDummy: DUMMY_RESISTS.has(key)
                        })
                    );
                });
            });

            DOM.resistGrid.appendChild(fragment);
        }

        function buildMarkFilter() {
            Object.keys(MARK_DEFINITIONS).forEach(key => {
                const def = MARK_DEFINITIONS[key];
                DOM.markGrid.appendChild(
                    UIFactory.createFilterButton({
                        dataset: { click: 'toggleMark', mark: key },
                        title: def.title,
                        iconType: 'text',
                        iconValue: def.icon
                    })
                );
            });
        }

        // ==========================================
        // 10. 検索・フィルターサービス (Search & Filter)
        // ==========================================

        const SearchService = {
            createRegex(rawKeyword) {
                if (!rawKeyword || typeof wanakana === 'undefined') return null;
                if (/([a-mop-z])\1{2,}/i.test(rawKeyword) || /n{4,}/i.test(rawKeyword)) return null;

                let hiraConverted = wanakana.toHiragana(rawKeyword, { IMEMode: true });
                hiraConverted = hiraConverted.replace(/([a-z])\1+/gi, 'っ$1');
                const tailMatch = hiraConverted.match(/([a-z]+)$/i);
                try {
                    if (tailMatch) {
                        const tailAlpha = tailMatch[1].toLowerCase();
                        const prefix = escapeRegExp(hiraConverted.slice(0, -tailAlpha.length));
                        const regexSuffix = ROMAJI_TO_KANA_REGEX[tailAlpha];
                        return new RegExp(prefix + (regexSuffix !== undefined ? regexSuffix : escapeRegExp(tailAlpha)));
                    } else {
                        return new RegExp(escapeRegExp(hiraConverted));
                    }
                } catch (e) {
                    return null;
                }
            },

            match(item, ctx) {
                if (!ctx.rawKeyword) return true;
                
                const isRawMatch = item.cache.searchIndex.includes(ctx.rawKeyword);
                let isKanaMatch = false;
        
                if (ctx.needsRegex && ctx.searchRegex) {
                    isKanaMatch = item.cache.kanaIndex && ctx.searchRegex.test(item.cache.kanaIndex);
                } else if (!ctx.needsRegex) {
                    isKanaMatch = item.cache.kanaIndex && item.cache.kanaIndex.includes(ctx.rawKeyword);
                }
        
                return isRawMatch || isKanaMatch;
            }
        };

        const FilterService = {
            apply() {
                const ctx = this.getFilterContext();
                AppState.stats.visibleCount = 0;
                AppState.stats.hasVisibleColumn = ctx.hasVisibleColumn;

                AppState.data.items.forEach(item => {
                    item.view.visible = this.matchesFilter(item, ctx);
                    if (item.view.visible) AppState.stats.visibleCount++;
                });
            },

            getFilterContext() {
                const rawKeyword = AppState.filters.text;
                const needsRegex = /[a-z]/i.test(rawKeyword);

                return {
                    hasVisibleColumn: Object.values(AppState.user.columns).some(v => v),
                    activeResists: Array.from(AppState.filters.resists),
                    activeMarks: Array.from(AppState.filters.marks),
                    rawKeyword: rawKeyword,
                    needsRegex: needsRegex,
                    searchRegex: needsRegex ? SearchService.createRegex(rawKeyword) : null
                };
            },

            matchesFilter(item, ctx) {
                return (
                    ctx.hasVisibleColumn &&
                    ctx.activeMarks.every(m => item.user.marks.has(m)) &&
                    ctx.activeResists.every(r => item.cache.resistIndex.has(r)) &&
                    SearchService.match(item, ctx)
                );
            }
        };

        // ==========================================
        // 11. 各種 Renderer (DOMの構築と更新)
        // ==========================================

        const CELL_RENDERERS = {
            text: (td, item, def) => {
                td.textContent = item.data[def.id] || '';
            },
            bossText: (td, item, def) => {
                const text = item.data[def.id] || '';
                if (!text) return;

                const names = text.split('\n');
                const images = (item.data.bossimage || '').split('\n');

                names.forEach((name, index) => {
                    const imgSrc = images[index]?.trim();

                    if (imgSrc) {
                        const link = document.createElement('span');
                        link.className = 'boss-link';
                        link.textContent = name.trim();
                        link.dataset.click = 'showModal';
                        link.dataset.imgSrc = imgSrc;
                        td.appendChild(link);
                    } else {
                        td.appendChild(document.createTextNode(name.trim()));
                    }

                    if (index < names.length - 1) {
                        td.appendChild(document.createElement('br'));
                    }
                });
            },
            resistIcon: (td, item, def) => {
                TableRenderer.createResistCell(item, td);
            },
            mark: (td, item, def) => {
                const container = document.createElement('div');
                Object.keys(MARK_DEFINITIONS).forEach(markKey => {
                    const markDef = MARK_DEFINITIONS[markKey];
                    const isActive = item.user.marks.has(markKey);
                    container.appendChild(TableRenderer.createMarkButton(item.id, markKey, isActive, markDef));
                });
                td.appendChild(container);
            },
            custom: (td, item, def) => {
                td.textContent = def.render(item);
            }
        };

        const TableRenderer = {
            buildTable() {
                ViewStore.rows.clear();
                ViewStore.columns.clear();

                if (AppState.data.items.length === 0) {
                    const tr = document.createElement('tr');
                    tr.className = 'no-hover-row';
                    const td = document.createElement('td');
                    td.colSpan = COLUMN_DEFINITIONS.length;
                    td.className = 'msg-container';
                    td.textContent = 'データが空です。';
                    tr.appendChild(td);
                    
                    DOM.tbody.replaceChildren(tr);
                    DOM.searchCounter.textContent = "検索結果: 0件 / 全0件";
                    return;
                }

                const fragment = document.createDocumentFragment();

                AppState.data.items.forEach(item => {
                    const tr = document.createElement('tr');
                    ViewStore.rows.set(item.id, tr);

                    COLUMN_DEFINITIONS.forEach(def => {
                        const isHidden = AppState.user.columns[def.id] === false;
                        const td = this.createCell(def, item, isHidden);

                        if (!ViewStore.columns.has(def.id)) {
                            ViewStore.columns.set(def.id, []);
                        }
                        ViewStore.columns.get(def.id).push(td);

                        tr.appendChild(td);
                    });

                    fragment.appendChild(tr);
                });

                if (!DOM.noResultRow) {
                    DOM.noResultRow = document.createElement('tr');
                    DOM.noResultRow.className = 'is-hidden no-hover-row';
                }
                fragment.appendChild(DOM.noResultRow);

                DOM.tbody.replaceChildren(fragment);

                ViewStore.headers.forEach((th, key) => {
                    th.classList.toggle('is-hidden', AppState.user.columns[key] === false);
                });
            },

            createCell(def, item, isHidden) {
                const td = document.createElement('td');
                td.className = `col-${def.className}`;
                if (isHidden) td.classList.add('is-hidden');

                const renderer = CELL_RENDERERS[def.type];
                if (renderer) {
                    renderer(td, item, def);
                } else {
                    td.textContent = item.data[def.id] || ''; 
                }
                
                return td;
            },

            createResistCell(item, td) {
                const resistStr = String(item.data.耐性アイコン || '-').replace(/\r\n/g, '\n').split('\n');
                resistStr.forEach(row => {
                    const keysInRow = row.split(',').map(k => k.trim()).filter(Boolean);
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'resist-row-inline';

                    RESIST_TYPES.forEach(attr => {
                        const foundKey = keysInRow.find(k => k.startsWith(attr));
                        rowDiv.appendChild(this.createResistIcon(foundKey));
                    });
                    td.appendChild(rowDiv);
                });
            },

            createResistIcon(foundKey) {
                if (foundKey && getIconPath(foundKey)) {
                    const img = document.createElement('img');
                    img.src = getIconPath(foundKey);
                    img.title = foundKey;
                    img.className = 'icon-img';
                    img.onerror = function() { 
                        const fallbackSpan = document.createElement('span');
                        fallbackSpan.className = 'icon-text';
                        fallbackSpan.textContent = '✖'; 
                        this.replaceWith(fallbackSpan); 
                    };
                    return img;
                } else {
                    const span = document.createElement('span');
                    span.className = 'icon-text';
                    span.textContent = '-';
                    return span;
                }
            },

            createMarkButton(mapKey, markType, isActive, markDef) {
                const span = document.createElement('span');
                span.className = `mark-btn-table ${isActive ? 'active' : ''}`;
                span.dataset.click = 'toggleRowMark';
                span.dataset.mapKey = mapKey;
                span.dataset.markType = markType;
                span.textContent = markDef.icon;
                span.title = markDef.title;
                return span;
            },

            updateTableState() {
                let currentVisibleIndex = 0;
                
                AppState.data.items.forEach(item => {
                    const wasVisible = item.view.lastVisible;
                    const wasEven = item.view.lastIsEven;
                    
                    const isVisible = item.view.visible;
                    let isEven = undefined;
                    
                    if (isVisible) {
                        currentVisibleIndex++;
                        isEven = (currentVisibleIndex % 2 === 1);
                    }
                    
                    if (wasVisible !== isVisible || wasEven !== isEven) {
                        const tr = ViewStore.rows.get(item.id);
                        if (tr) {
                            if (wasVisible !== isVisible) {
                                tr.classList.toggle('is-hidden', !isVisible);
                            }
                            if (isVisible && wasEven !== isEven) {
                                tr.classList.toggle('row-even', isEven);
                            } else if (!isVisible && wasEven !== undefined) {
                                tr.classList.remove('row-even');
                            }
                        }
                        item.view.lastVisible = isVisible;
                        item.view.lastIsEven = isEven;
                    }
                });
            },

            reorderRows() {
                const fragment = document.createDocumentFragment();
                AppState.data.items.forEach(item => {
                    const tr = ViewStore.rows.get(item.id);
                    if (tr) fragment.appendChild(tr);
                });
                if (DOM.noResultRow) fragment.appendChild(DOM.noResultRow);
                DOM.tbody.replaceChildren(fragment);
            },

            updateRowMarkUI(btnElement, isActive) {
                btnElement.classList.toggle('active', isActive);
            }
        };

        const ColumnRenderer = {
            updateButtonUI() {
                let visibleCount = 0;
                for (const key of Object.keys(AppState.user.columns)) {
                    const menuItem = ViewStore.columnMenuItems.get(key);
                    if (menuItem) {
                        const checkmark = menuItem.querySelector('.checkmark');
                        if (checkmark) checkmark.style.visibility = AppState.user.columns[key] ? 'visible' : 'hidden';
                    }
                    if (AppState.user.columns[key]) visibleCount++;
                }
                DOM.btnColumnText.innerText = `表示項目: ${visibleCount}/${COLUMN_DEFINITIONS.length}`;
            },

            updateColumnVisibility(columnKey, visible) {
                const cells = ViewStore.columns.get(columnKey);
                if (cells) cells.forEach(el => el.classList.toggle('is-hidden', !visible));

                const th = ViewStore.headers.get(columnKey);
                if (th) th.classList.toggle('is-hidden', !visible);
            },
            updateFirstVisibleCol() {
                // 前回の対象列だけを記録しておく
                if (this.currentFirstColumn) {
                    ViewStore.columns
                        .get(this.currentFirstColumn)
                        ?.forEach(el => el.classList.remove('first-visible-cell'));
                }

                const firstVisibleDef = COLUMN_DEFINITIONS.find(
                    def => AppState.user.columns[def.id] !== false // (※補足) false 以外なら表示扱い
                );

                if (!firstVisibleDef) {
                    this.currentFirstColumn = null;
                    return;
                }

                ViewStore.columns
                    .get(firstVisibleDef.id)
                    ?.forEach(el => el.classList.add('first-visible-cell'));

                this.currentFirstColumn = firstVisibleDef.id;
            }
        };

        const FilterUIRenderer = {
            updateResistUI() {
                const resists = AppState.filters.resists;
                document.querySelectorAll('#resist-grid .icon-wrapper').forEach(el => {
                    el.classList.toggle('active', resists.has(el.dataset.resist));
                });
                DOM.resistGrid.classList.toggle('has-active', resists.size > 0);
            },

            updateMarkUI() {
                const marks = AppState.filters.marks;
                document.querySelectorAll('#mark-grid .icon-wrapper').forEach(el => {
                    el.classList.toggle('active', marks.has(el.dataset.mark));
                });
            }
        };

        const FooterRenderer = {
            updateFooter() {
                DOM.searchCounter.textContent = `検索結果: ${AppState.stats.visibleCount}件 / 全${AppState.data.items.length}件`;
            
                if (!DOM.noResultRow) return;

                const visibleColCount = Object.values(AppState.user.columns).filter(v => v).length || 1;
                
                DOM.noResultRow.replaceChildren();

                if (!AppState.stats.hasVisibleColumn || AppState.stats.visibleCount === 0) {
                    DOM.noResultRow.classList.remove('is-hidden');
                    
                    const td = document.createElement('td');
                    td.colSpan = visibleColCount;
                    td.className = 'msg-container';

                    const span = document.createElement('span');
                    const br = document.createElement('br');
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'btn-action';
                    btn.style.marginTop = '16px';
                    btn.style.display = 'inline-flex';

                    if (!AppState.stats.hasVisibleColumn) {
                        span.textContent = '選択項目がありません';
                        btn.dataset.click = 'resetView';
                        btn.textContent = '↺ ソート・表示項目の初期化';
                    } else {
                        span.textContent = '該当するデータが見つかりませんでした。';
                        btn.dataset.click = 'clearAllFilters';
                        btn.textContent = '✖ 検索・フィルターの全解除';
                    }

                    td.appendChild(span);
                    td.appendChild(br);
                    td.appendChild(btn);
                    DOM.noResultRow.appendChild(td);
                } else {
                    DOM.noResultRow.classList.add('is-hidden');
                }
            }
        };
    </script>
</body>
