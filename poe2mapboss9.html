<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE2 ver0.5 マップボスリスト</title>
    <style>
        :root {
            /* =========================
               背景色 (Backgrounds)
            ========================= */
            --bg-body: #1c1917;
            --bg-panel: #292524;
            --bg-table: #292524;
            --bg-th: #44403c;
            --bg-tr-even: #23201e;
            --bg-tr-hover: rgba(203, 166, 95, 0.15);

            /* =========================
               テキスト (Typography)
            ========================= */
            --text-main: #e7e5e4;
            --text-muted: #a8a29e;

            /* =========================
               ボーダー・ライン (Borders & Lines)
            ========================= */
            --border-color: #57534e;
            --separator-color: #78716c;

            /* =========================
               アクセント・UIカラー (Accents & UI)
            ========================= */
            --accent-gold: #cba65f;
            --btn-on: #10b981;
            --btn-sort-active: #60a5fa;

            /* =========================
               耐性ステータスカラー (RGB値)
            ========================= */
            --color-weak: 239, 68, 68;     /* 赤 */
            --color-strong: 234, 179, 8;   /* 黄 */
            --color-normal: 208, 206, 205; /* 灰 */

            /* =========================
               装飾・サイズ (Effects & Radius)
            ========================= */
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --radius-md: 12px;
            --radius-sm: 8px;
            
            /* =========================
               アニメーション (Transitions)
            ========================= */
            --transition-normal: 0.2s ease;
            --transition-bounce: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ==========================================
           基盤設定 (Base & Layout)
        ========================================== */
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px 10px;
            margin: 0;
            line-height: 1.5;
        }

        .content-width {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* ==========================================
           ヘッダーエリア (Header)
        ========================================== */
        a.back-link {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
            transition: color var(--transition-normal), transform var(--transition-normal);
        }

        a.back-link:hover {
            color: #fef08a;
            transform: translateX(-4px);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
        }

        .reference-link-top a {
            color: #60a5fa;
            text-decoration: none;
        }

        .reference-link-top a:hover {
            text-decoration: underline;
        }

        /* ==========================================
           コントロールパネル (Controls)
        ========================================== */
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
            background-color: var(--bg-panel);
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        .controls-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            width: 100%;
        }

        /* --- 区切り線 --- */
        .separator-horizontal {
            width: 100%;
            height: 1px;
            background-color: rgba(87, 83, 78, 0.4);
        }

        .separator-strong {
            width: 2px;
            height: 32px;
            background-color: var(--separator-color);
            flex-shrink: 0;
            border-radius: 1px;
        }

        .separator-weak {
            width: 1px;
            height: 26px;
            background-color: rgba(87, 83, 78, 0.6);
            flex-shrink: 0;
        }

        /* ==========================================
           ボタン類 (Buttons)
        ========================================== */
        .btn-action, .btn-dropdown {
            height: 44px;
            box-sizing: border-box;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            transition: all var(--transition-normal);
            outline: none;
        }

        .btn-action:active, .btn-dropdown:active {
            transform: translateY(1px);
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 16px;
            white-space: nowrap;
            flex-shrink: 0;
            background: rgba(180, 120, 40, 0.15);
            border: 1px solid rgba(210, 150, 70, 0.40);
            color: #e8c88a;
        }

        .btn-action:hover {
            background-color: rgba(180, 120, 40, 0.3);
            color: #fff;
            box-shadow: 0 0 10px rgba(210, 150, 70, 0.3);
        }

        /* ==========================================
           ドロップダウン (Dropdown)
        ========================================== */
       .btn-dropdown {
            display: grid;
            grid-template-columns: 24px 1fr 24px;
            align-items: center;
            width: 270px;
            padding: 0 12px;
            background-color: var(--bg-th);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            white-space: nowrap;
        }

        .btn-dropdown:hover {
            background-color: var(--border-color);
            color: #fff;
        }
        
        .btn-left-icon, .dropdown-icon {
            text-align: center;
            font-size: 15px;
        }

        .dropdown-icon {
            font-size: 12px;
            pointer-events: none;
        }

        .btn-label {
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            z-index: 100;
            padding: 8px;
            min-width: 260px;
            box-sizing: border-box;
        }

        .dropdown.show .dropdown-content {
            display: block;
        }
        
        .dropdown-item {
            padding: 10px 16px;
            font-size: 15px;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: var(--radius-sm);
            user-select: none;
            transition: background-color var(--transition-normal);
        }

        .dropdown-item:hover {
            background-color: var(--bg-th);
            color: #ffffff;
        }

        .dropdown-item .checkmark {
            width: 18px;
            font-weight: bold;
            color: var(--btn-on);
            visibility: hidden;
        }

        .dropdown-item.sort-active {
            color: var(--btn-sort-active);
            font-weight: 700;
        }

        .dropdown-item.sort-active .checkmark {
            visibility: visible;
        }
        
        .dropdown-divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 6px 0;
        }

        .action-item {
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* ==========================================
           検索ボックス (Search Box)
        ========================================== */
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            flex-grow: 1;
            max-width: 450px;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            font-size: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            height: 44px;
            padding: 10px 40px 10px 42px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            background-color: rgba(0,0,0,0.2);
            color: white;
            border-radius: var(--radius-sm);
            box-sizing: border-box;
            transition: all var(--transition-normal);
        }

        #searchInput:focus {
            outline: none;
            border-color: #ffffff;
            box-shadow: 0 0 10px 2px rgba(255,255,255,0.2);
        }
        
        .clear-text-btn {
            position: absolute;
            right: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-main);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition-normal);
            visibility: hidden;
            opacity: 0;
        }

        .clear-text-btn:hover {
            background: rgba(255,255,255,0.3);
            color: #fff;
        }

        #searchInput:not(:placeholder-shown) ~ .clear-text-btn {
            visibility: visible;
            opacity: 1;
        }

        .search-counter {
            font-size: 15px;
            font-weight: bold;
            color: var(--accent-gold);
            white-space: nowrap;
        }

        /* ==========================================
           耐性フィルター (Resist Icons)
        ========================================== */
        .resist-filter-grid {
            display: grid;
            grid-template-columns: repeat(6, 36px);
            grid-template-rows: repeat(3, 36px);
            gap: 8px;
        }
        
        .icon-wrapper {
            position: relative;
            width: 36px;
            height: 36px;
            cursor: pointer;
            border-radius: 50%;
            transition: all var(--transition-normal);
        }

        .icon-filter {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            background-color: var(--bg-th);
            object-fit: contain;
            box-sizing: border-box;
            transition: all var(--transition-normal);
        }
        
        .icon-wrapper:not(.active):hover {
            transform: translateY(-2px);
        }
        
        /* --- 耐性ステータスカラーの適用 --- */
        .icon-wrapper[data-resist$="Weak"] { --status-color: var(--color-weak); }
        .icon-wrapper[data-resist$="Strong"] { --status-color: var(--color-strong); }
        .icon-wrapper[data-resist]:not([data-resist$="Weak"]):not([data-resist$="Strong"]) { --status-color: var(--color-normal); }

        .icon-wrapper[data-resist] .icon-filter {
            border: 2px solid rgba(var(--status-color), 0.4);
            background-color: rgba(var(--status-color), 0.1);
        }

        .icon-wrapper[data-resist]:hover .icon-filter {
            border-color: rgba(var(--status-color), 0.8);
            background-color: rgba(var(--status-color), 0.2);
        }

        .icon-wrapper.active[data-resist] .icon-filter {
            border-color: rgb(var(--status-color));
            box-shadow: 0 0 10px rgba(var(--status-color), 0.6);
            background-color: rgba(var(--status-color), 0.3);
        }

        .resist-filter-grid.has-active .icon-wrapper:not(.active) {
            opacity: 0.35;
            filter: grayscale(50%);
        }

        .resist-filter-grid.has-active .icon-wrapper:not(.active):hover {
            opacity: 0.8;
        }

        /* --- 選択時のチェックマーク --- */
        .badge-check {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background-color: var(--btn-on);
            color: #fff;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            border: 2px solid var(--bg-panel);
            opacity: 0;
            transform: scale(0.5);
            transition: all var(--transition-bounce);
        }

        .icon-wrapper.active .badge-check {
            opacity: 1;
            transform: scale(1);
        }

        .icon-wrapper.active[data-resist] .badge-check {
            background-color: var(--btn-on);
            border-color: var(--bg-panel);
        }

        .icon-dummy {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--border-color);
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }

        /* ==========================================
           テーブル全体 (Table Settings)
        ========================================== */
        .table-wrapper {
            border-radius: var(--radius-md);
            overflow: hidden;
            background-color: var(--bg-table);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            font-size: 14px;
        }
        
        th, td {
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            padding: 8px 10px;
            line-height: 2.0;
            min-width: 6em;
            word-break: break-all;
            word-break: auto-phrase;
            overflow-wrap: anywhere;
            white-space: pre-wrap;
        }

        th:last-child, td:last-child { border-right: none; }
        tr:last-child td { border-bottom: none; }

        th {
            background-color: var(--bg-th);
            color: #ffffff;
            white-space: nowrap;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 1px 0 var(--border-color);
        }

        td { text-align: left; }
        
        tr { transition: background-color var(--transition-normal); }
        tr td:first-child { transition: box-shadow var(--transition-normal); }
        tr.row-even { background-color: var(--bg-tr-even); }
        
        tr:not(.no-hover-row):hover { background-color: var(--bg-tr-hover); }
        tr:not(.no-hover-row):hover td:first-child { box-shadow: inset 4px 0 0 var(--accent-gold); }

        .is-hidden { display: none !important; }
        
        .msg-container {
            text-align: center;
            padding: 48px 20px;
            font-weight: 700;
            font-size: 18px;
            color: var(--text-muted);
            white-space: normal;
        }

        /* ==========================================
           テーブル内の個別列設定 (Table Columns)
        ========================================== */
        .col-耐性アイコン {
            width: 180px;
            min-width: 180px;
            max-width: 180px;
            text-align: center;
            white-space: normal;
        }

        .resist-row-inline {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            width: 100%;
            gap: 2px;
            margin-bottom: 2px;
        }

        .icon-img, .icon-text {
            display: inline-block;
            width: 24px;
            height: 24px;
            margin: 2px;
            vertical-align: middle;
            border-radius: 50%;
        }

        .icon-text {
            line-height: 24px;
            text-align: center;
            color: var(--text-muted);
            font-weight: bold;
            font-size: 14px;
        }

        /* --- テーブル内アイコンのステータスカラー適用 --- */
        .icon-img[title$="Weak"] { --table-status-color: var(--color-weak); }
        .icon-img[title$="Strong"] { --table-status-color: var(--color-strong); }
        .icon-img[title]:not([title$="Weak"]):not([title$="Strong"]) { --table-status-color: var(--color-normal); }

        .icon-img {
            object-fit: contain;
            padding: 0;
            background-color: rgba(var(--table-status-color), 0.15);
            box-shadow: 0 0 0 2px rgba(var(--table-status-color), 0.5), 0 1px 2px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-normal); 
        }

        .icon-img:hover {
            box-shadow: 0 0 0 2px rgb(var(--table-status-color)), 0 0 8px rgba(var(--table-status-color), 0.6);
            background-color: rgba(var(--table-status-color), 0.3);
            transform: translateY(-1px);
        }

        /* ==========================================
           レスポンシブ・スマホ最適化 (Mobile)
        ========================================== */
        @media (max-width: 900px) {
            .controls-row {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .separator-strong, .separator-weak, .separator-horizontal { display: none; }
            .search-wrapper { max-width: 100%; width: 100%; min-width: 0; }
            .search-counter { width: 100%; text-align: center; }
            .btn-dropdown, .btn-action, .dropdown { width: 100%; min-width: 0; }
            .dropdown-content { min-width: 100%; box-sizing: border-box; }
            .resist-filter-grid { justify-content: center; }
            
            .table-wrapper { overflow-x: auto; }
            th { white-space: normal; }
            table { font-size: 12px; }
            th, td { padding: 4px 6px; }
            
            .col-耐性アイコン { min-width: 110px; max-width: 150px; }
            .resist-row-inline { flex-wrap: wrap; }
            .col-ボス日本語, .col-ボス英語 { line-height: 1.5; }
            
            /* スマホ時の要素の並び順（order）設定 */
            #btn-clear-filters { order: 1; }
            #resist-grid { order: 2; }
            #search-wrap { order: 3; }
            #search-counter { order: 4; }
        }
    </style>
</head>
<body>

    <div class="content-width">
        <a href="poe2index.html" class="back-link">
            <svg style="width:18px;height:18px;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Indexに戻る
        </a>
    </div>

    <div class="header-container content-width">
        <div>
            <h1>PoE2 ver0.5 マップボスリスト</h1>
            <div id="fallback-message" class="is-hidden" style="color: #f87171; font-size: 14px; margin-top: 8px;">
                ※JSONファイルが読み込めなかったため、テスト用のダミーデータを表示しています。
            </div>
        </div>
        <div class="reference-link-top">
            参考データ: <a href="https://poe2db.tw/jp/Waystones#EndGameMaps" target="_blank" rel="noopener noreferrer">PoE2DB (Waystones)</a>
        </div>
    </div>

    <div class="controls-wrapper content-width">
        <div class="controls-row">
            <button class="btn-action" data-action="resetView">↺ ソート・表示項目の初期化</button>
            
            <div class="separator-strong"></div>
            
            <div class="dropdown">
                <button class="btn-dropdown">
                    <span class="btn-left-icon">↕</span>
                    <span id="btn-sort-text" class="btn-label">マップ名ソート: 初期順</span>
                    <span class="dropdown-icon">▼</span>
                </button>
                <div class="dropdown-content">
                    <div class="dropdown-item sort-active" data-sort="default" data-sort-name="初期順"><span class="checkmark">✔</span>初期順</div>
                    <div class="dropdown-item" data-sort="kana-asc" data-sort-name="五十音順"><span class="checkmark">✔</span>五十音順</div>
                    <div class="dropdown-item" data-sort="kana-desc" data-sort-name="五十音逆順"><span class="checkmark">✔</span>五十音逆順</div>
                    <div class="dropdown-item" data-sort="eng-asc" data-sort-name="英語順"><span class="checkmark">✔</span>英語順</div>
                    <div class="dropdown-item" data-sort="eng-desc" data-sort-name="英語逆順"><span class="checkmark">✔</span>英語逆順</div>
                </div>
            </div>
            
            <div class="separator-weak"></div>
            
            <div class="dropdown">
                <button class="btn-dropdown">
                    <span class="btn-left-icon">⊞</span>
                    <span id="btn-column-text" class="btn-label">表示項目</span>
                    <span class="dropdown-icon">▼</span>
                </button>
                <div class="dropdown-content" id="column-dropdown-content">
                    <div class="dropdown-item action-item" data-column-action="showAll">☑ すべて表示</div>
                    <div class="dropdown-item action-item" data-column-action="hideAll">☐ すべて非表示</div>
                    <div class="dropdown-divider"></div>
                    </div>
            </div>
        </div>

        <div class="separator-horizontal"></div>

        <div class="controls-row">
            <button class="btn-action" data-action="clearAllFilters" id="btn-clear-filters">✖ 検索・フィルターの全解除</button>
            
            <div class="separator-strong"></div>

            <div class="search-wrapper" id="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="マップ名やボス名で検索..." autocomplete="off">
                <button class="clear-text-btn" data-action="clearSearchText" title="文字を消去">✖</button>
            </div>

            <div class="separator-weak"></div>

            <div class="resist-filter-grid" id="resist-grid">
                <div class="icon-dummy" title="ArmourWeak">-</div>
                <div class="icon-dummy" title="EvasionWeak">-</div>
                <div class="icon-wrapper" data-resist="FireWeak" title="FireWeak"><img src="images/IconEnemy/IconEnemyResistanceFireWeak.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="ColdWeak" title="ColdWeak"><img src="images/IconEnemy/IconEnemyResistanceColdWeak.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="LightningWeak" title="LightningWeak"><img src="images/IconEnemy/IconEnemyResistanceLightningWeak.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-dummy" title="ChaosWeak">-</div>
                
                <div class="icon-wrapper" data-resist="Armour" title="Armour"><img src="images/IconEnemy/IconEnemyArmour.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="Evasion" title="Evasion"><img src="images/IconEnemy/IconEnemyEvasion.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="Fire" title="Fire"><img src="images/IconEnemy/IconEnemyResistanceFire.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="Cold" title="Cold"><img src="images/IconEnemy/IconEnemyResistanceCold.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="Lightning" title="Lightning"><img src="images/IconEnemy/IconEnemyResistanceLightning.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="Chaos" title="Chaos"><img src="images/IconEnemy/IconEnemyResistanceChaos.png" class="icon-filter"><div class="badge-check">✔</div></div>
                
                <div class="icon-wrapper" data-resist="ArmourStrong" title="ArmourStrong"><img src="images/IconEnemy/IconEnemyArmourStrong.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="EvasionStrong" title="EvasionStrong"><img src="images/IconEnemy/IconEnemyEvasionStrong.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="FireStrong" title="FireStrong"><img src="images/IconEnemy/IconEnemyResistanceFireStrong.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="ColdStrong" title="ColdStrong"><img src="images/IconEnemy/IconEnemyResistanceColdStrong.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="LightningStrong" title="LightningStrong"><img src="images/IconEnemy/IconEnemyResistanceLightningStrong.png" class="icon-filter"><div class="badge-check">✔</div></div>
                <div class="icon-wrapper" data-resist="ChaosStrong" title="ChaosStrong"><img src="images/IconEnemy/IconEnemyResistanceChaosStrong.png" class="icon-filter"><div class="badge-check">✔</div></div>
            </div>

            <div class="separator-weak"></div>
            
            <div id="search-counter" class="search-counter">検索結果: -件 / 全-件</div>
        </div>
    </div>

    <div class="table-wrapper content-width">
        <table id="boss-table">
            <thead>
                <tr id="boss-table-head-row"></tr>
            </thead>
            <tbody id="boss-table-body">
            </tbody>
        </table>
    </div>

    <script src="js/wanakana.min.js"></script>

    <script>
        // ==========================================
        // 1. 列定義の一元管理 (Single Source of Truth)
        // ==========================================
        
        const COLUMN_DEFINITIONS = [
            { id: 'よみがな', label: 'よみがな', defaultVisible: false, isSearchable: true, type: 'text' },
            { id: 'マップ日本語', label: 'マップ日本語', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: 'ボス日本語', label: 'ボス日本語', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: 'マップ英語', label: 'マップ英語', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: 'ボス英語', label: 'ボス英語', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: '耐性アイコン', label: '耐性アイコン', defaultVisible: true, isSearchable: false, type: 'resistIcon' },
            { 
                id: '元ボスアクト/エリア', 
                label: '元ボスアクト/エリア', 
                defaultVisible: true, 
                isSearchable: true, 
                searchKeys: ['元ボスアクト', '元ボスエリア'],
                type: 'custom', 
                render: (item) => {
                    const act = item['元ボスアクト'] ? `${item['元ボスアクト']}章` : '';
                    const area = item['元ボスエリア'] || '';
                    return [act, area].filter(Boolean).join('\n');
                }
            },
            { id: '元ボス名', label: '元ボス名', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: '元ボス特徴', label: '元ボス特徴', defaultVisible: true, isSearchable: true, type: 'text' },
            { id: 'メモ', label: 'メモ', defaultVisible: true, isSearchable: true, type: 'text' }
        ];
        
        
        // ==========================================
        // 2. 定数と状態管理 (AppState)
        // ==========================================
        
        const RESIST_DEFINITIONS = {
            Armour: { normal: 'images/IconEnemy/IconEnemyArmour.png', strong: 'images/IconEnemy/IconEnemyArmourStrong.png' },
            Evasion: { normal: 'images/IconEnemy/IconEnemyEvasion.png', strong: 'images/IconEnemy/IconEnemyEvasionStrong.png' },
            Fire: { normal: 'images/IconEnemy/IconEnemyResistanceFire.png', strong: 'images/IconEnemy/IconEnemyResistanceFireStrong.png', weak: 'images/IconEnemy/IconEnemyResistanceFireWeak.png' },
            Cold: { normal: 'images/IconEnemy/IconEnemyResistanceCold.png', strong: 'images/IconEnemy/IconEnemyResistanceColdStrong.png', weak: 'images/IconEnemy/IconEnemyResistanceColdWeak.png' },
            Lightning: { normal: 'images/IconEnemy/IconEnemyResistanceLightning.png', strong: 'images/IconEnemy/IconEnemyResistanceLightningStrong.png', weak: 'images/IconEnemy/IconEnemyResistanceLightningWeak.png' },
            Chaos: { normal: 'images/IconEnemy/IconEnemyResistanceChaos.png', strong: 'images/IconEnemy/IconEnemyResistanceChaosStrong.png' }
        };
        const RESIST_TYPES = Object.keys(RESIST_DEFINITIONS);
        
        const ROMAJI_TO_KANA_REGEX = {
            'a': '[あぁ]', 'i': '[いぃ]', 'u': '[うぅ]', 'e': '[えぇ]', 'o': '[おぉ]',
            'k': '[かきくけこきゃきゅきょ]', 'ky': '[きゃきゅきょ]', 
            's': '[さしすせそしゃしゅしょ]', 'sh': '[しゃしゅしょし]', 'sy': '[しゃしゅしょ]',
            't': '[たちつてとちゃちゅちょっ]', 'c': '[かきくけこさしすせそちゃちゅちょ]', 'ch': '[ちゃちゅちょち]', 'ty': '[ちゃちゅちょ]', 'cy': '[ちゃちゅちょ]',
            'ts': '[つ]', 
            'n': '[なにぬねのんにゃにゅにょ]', 'ny': '[にゃにゅにょ]',
            'h': '[はひふへほひゃひゅひょ]', 'hy': '[ひゃひゅひょ]',
            'f': '[ふぁふぃふふぇふぉ]', 'fy': '[ふゃふゅふょ]',
            'm': '[まみむめもみゃみゅみょ]', 'my': '[みゃみゅみょ]',
            'y': '[やゆよゃゅょ]',
            'r': '[らりるれろりゃりゅりょ]', 'ry': '[りゃりゅりょ]',
            'w': '[わをん]', 
            'g': '[がぎぐげごぎゃぎゅぎょ]', 'gy': '[ぎゃぎゅぎょ]',
            'z': '[ざじずぜぞじゃじゅじょ]', 'j': '[じゃじゅじょじ]', 'zy': '[じゃじゅじょ]', 'jy': '[じゃじゅじょ]',
            'd': '[だぢづでど]', 'dy': '[ぢゃぢゅぢょ]',
            'b': '[ばびぶべぼびゃびゅびょ]', 'by': '[びゃびゅびょ]',
            'p': '[ぱぴぷぺぽぴゃぴゅぴょ]', 'py': '[ぴゃぴゅぴょ]',
            'v': '[ゔぁゔぃゔゔぇゔぉ]', 'vy': '[ゔゃゔゅゔょ]',
            'q': '[くぁくぃくくぇくぉ]', 
            'x': '[ぁぃぅぇぉっゃゅょ]', 'l': '[ぁぃぅぇぉっゃゅょ]'
        };
        
        const JA_COLLATOR = new Intl.Collator('ja', { numeric: true });
        const EN_COLLATOR = new Intl.Collator('en', { numeric: true });
        
        const AppState = {
            currentData: [],
            columnState: {},
            currentSort: 'default',
            filterState: {
                text: '',
                resists: new Set()
            }
        };
        
        const DOM = {
            searchInput: null, searchCounter: null, resistGrid: null,
            btnSortText: null, btnColumnText: null, tbody: null,
            fallbackMessage: null, noResultRow: null
        };
        
        
        // ==========================================
        // 3. ユーティリティ関数
        // ==========================================
        
        function normalizeText(str) { 
            if (!str) return '';
            return String(str).normalize('NFKC').replace(/[\u30a1-\u30f6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60)).toLowerCase(); 
        }
        
        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        
        function getIconPath(resistKey) {
            if (resistKey.endsWith('Strong')) return RESIST_DEFINITIONS[resistKey.replace('Strong', '')]?.strong;
            if (resistKey.endsWith('Weak')) return RESIST_DEFINITIONS[resistKey.replace('Weak', '')]?.weak;
            return RESIST_DEFINITIONS[resistKey]?.normal;
        }
        
        
        // ==========================================
        // 4. 初期化処理 (UI動的生成とデータ読み込み)
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', () => {
            DOM.searchInput = document.getElementById('searchInput');
            DOM.searchCounter = document.getElementById('search-counter');
            DOM.resistGrid = document.getElementById('resist-grid');
            DOM.btnSortText = document.getElementById('btn-sort-text');
            DOM.btnColumnText = document.getElementById('btn-column-text');
            DOM.tbody = document.getElementById('boss-table-body');
            DOM.fallbackMessage = document.getElementById('fallback-message');
        
            setupDynamicUI();
            setupEventListeners();
            loadData();
        });
        
        function setupDynamicUI() {
            const headerRow = document.getElementById('boss-table-head-row');
            const colDropdown = document.getElementById('column-dropdown-content');
        
            COLUMN_DEFINITIONS.forEach(def => {
                const safeKey = def.id.replace(/\//g, '');
                
                const th = document.createElement('th');
                th.className = `col-${safeKey}`;
                th.dataset.key = def.id;
                th.textContent = def.label;
                headerRow.appendChild(th);
        
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.dataset.column = def.id;
                div.innerHTML = `<span class="checkmark">✔</span>${def.label}`;
                colDropdown.appendChild(div);
        
                AppState.columnState[def.id] = def.defaultVisible;
            });
        }
        
        function loadData() {
            fetch('poe2mapboss.json')
                .then(r => {
                    if (!r.ok) throw new Error();
                    return r.json();
                })
                .then(data => initializeApp(data))
                .catch(() => {
                    console.warn("JSONデータの読み込みに失敗しました。動作確認用のダミーデータを表示します。");
                    DOM.fallbackMessage.classList.remove('is-hidden');
                    const dummyData = [
                        { "よみがな": "だみーまっぷ", "マップ日本語": "ダミーマップ", "ボス日本語": "ダミーボス", "マップ英語": "DummyMap", "ボス英語": "DummyBoss", "耐性アイコン": "FireWeak,ColdWeak,LightningWeak", "元ボスアクト": "元ダミーアクト", "元ボスエリア": "元ダミーエリア", "元ボス名": "元ダミーボス", "元ボス特徴": "ダミー", "メモ": "ダミーメモ" },
                        { "よみがな": "しんりんちたい", "マップ日本語": "森林地帯", "ボス日本語": "肥大したマータ\n怨嗟のコルム", "マップ英語": "Woodland", "ボス英語": "Murtagh, the Engorged\nColm, the Rancorous", "耐性アイコン": "Armour,Evasion,Fire,Cold,Lightning,Chaos\n", "元ボスアクト": "１", "元ボスエリア": "川岸", "元ボス名": "腐乱した粉屋\n腐乱した粉屋", "元ボス特徴": "粉屋×２", "メモ": "だみー２" },
                        { "よみがな": "ひすいのしま", "マップ日本語": "ヒスイの島", "ボス日本語": "選ばれし者、マノキ\n熱病に侵されし者、マノキ\n冒督されし者、マノキ", "マップ英語": "The Jade Isles", "ボス英語": "Manoki, the Chosen\nManoki, the Fevered\nManoki, the Defiled", "耐性アイコン": "ArmourStrong,EvasionStrong,FireStrong,ColdStrong,LightningStrong,ChaosStrong\n\n", "元ボスアクト": "４", "元ボスエリア": "部族の中心", "元ボス名": "族長、タヴァカイ\n堕ちたタヴァカイ\n蝕まれたタヴァカイ", "元ボス特徴": "4章ボス", "メモ": "だみー３" }
                    ];
                    initializeApp(dummyData);
                });
        }
        
        function initializeApp(data) {
            const searchIndexKeys = [];
            COLUMN_DEFINITIONS.filter(d => d.isSearchable).forEach(d => {
                if (d.searchKeys) searchIndexKeys.push(...d.searchKeys);
                else searchIndexKeys.push(d.id);
            });
        
            AppState.currentData = data.map((item, idx) => {
                const resistIndex = new Set(
                    String(item.耐性アイコン || '-').replace(/\r\n/g, '\n').split(/[\n,]+/).map(r => r.trim()).filter(r => r && r !== '-')
                );
                const searchIndex = normalizeText(searchIndexKeys.map(k => item[k] || '').join(' '));
                const kanaIndex = normalizeText(item.よみがな);
                
                return { 
                    ...item, 
                    id: idx, 
                    defaultOrder: idx, 
                    searchIndex, 
                    resistIndex, 
                    kanaIndex, 
                    element: null,
                    visible: true,      
                    isEven: undefined    
                };
            });
            
            buildTable(AppState.currentData);
            filterTable();
            updateButtonUI();
        }
        
        
        // ==========================================
        // 5. イベントリスナーとアクションマップ
        // ==========================================
        
        const ACTIONS = {
            resetView: () => resetView(),
            clearAllFilters: () => clearAllFilters(),
            clearSearchText: () => clearSearchText()
        };

        function setupEventListeners() {
            setupSearchEvents();
            setupKeyboardEvents();
            setupClickDelegation(); 
        }

        function setupSearchEvents() {
            let searchTimer;
            DOM.searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    AppState.filterState.text = normalizeText(e.target.value);
                    filterTable();
                }, 150); 
            });
        }

        function setupKeyboardEvents() {
            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f') {
                    if (DOM.searchInput) {
                        e.preventDefault();
                        DOM.searchInput.focus();
                        DOM.searchInput.select(); 
                    }
                }
            });
        }

        function setupClickDelegation() {
            document.addEventListener('click', (e) => {
                handleDropdownClick(e);
                handleActionClick(e);
                handleSortClick(e);
                handleColumnClick(e);
                handleResistClick(e);
            });
        }

        function handleDropdownClick(e) {
            document.querySelectorAll('.dropdown').forEach(dropdown => {
                if (!dropdown.contains(e.target)) dropdown.classList.remove('show');
            });

            const dropdownBtn = e.target.closest('.btn-dropdown');
            if (dropdownBtn) {
                const parent = dropdownBtn.parentElement;
                const isAlreadyOpen = parent.classList.contains('show');
                document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
                if (!isAlreadyOpen) parent.classList.add('show');
            }
        }

        function handleActionClick(e) {
            const actionBtn = e.target.closest('[data-action]');
            if (actionBtn) {
                const action = actionBtn.dataset.action;
                ACTIONS[action]?.();
            }
        }

        function handleSortClick(e) {
            const sortItem = e.target.closest('[data-sort]');
            if (sortItem) {
                applySort(sortItem.dataset.sort, sortItem.dataset.sortName);
            }
        }

        function handleColumnClick(e) {
            const colAction = e.target.closest('[data-column-action]');
            if (colAction) {
                setAllColumns(colAction.dataset.columnAction === 'showAll');
                return;
            }

            const colToggle = e.target.closest('[data-column]');
            if (colToggle) {
                toggleColumn(colToggle.dataset.column);
            }
        }

        function handleResistClick(e) {
            const resistIcon = e.target.closest('.icon-wrapper[data-resist]');
            if (resistIcon) {
                resistIcon.classList.toggle('active');
                const resist = resistIcon.dataset.resist;
                
                if (resistIcon.classList.contains('active')) AppState.filterState.resists.add(resist);
                else AppState.filterState.resists.delete(resist);
                
                DOM.resistGrid.classList.toggle('has-active', AppState.filterState.resists.size > 0);
                filterTable();
            }
        }
        
        
        // ==========================================
        // 6. テーブル構築
        // ==========================================
        
        function buildTable(data) {
            DOM.tbody.innerHTML = ''; 
        
            const hiddenColumns = new Set();
            for (const [key, visible] of Object.entries(AppState.columnState)) {
                if (!visible) hiddenColumns.add(key);
            }
        
            if (data.length === 0) {
                DOM.tbody.innerHTML = `<tr class="no-hover-row"><td colspan="${COLUMN_DEFINITIONS.length}" class="msg-container">データが空です。</td></tr>`;
                DOM.searchCounter.textContent = "検索結果: 0件 / 全0件";
                return;
            }
        
            const fragment = document.createDocumentFragment();
        
            data.forEach(item => {
                const tr = createRow(item, hiddenColumns);
                item.element = tr;
                fragment.appendChild(tr);
            });
        
            DOM.noResultRow = document.createElement('tr');
            DOM.noResultRow.className = 'is-hidden no-hover-row';
            fragment.appendChild(DOM.noResultRow);
        
            DOM.tbody.appendChild(fragment);
        
            document.querySelectorAll('th[data-key]').forEach(th => {
                th.classList.toggle('is-hidden', hiddenColumns.has(th.dataset.key));
            });
        }
        
        function createRow(item, hiddenColumns) {
            const tr = document.createElement('tr');
            COLUMN_DEFINITIONS.forEach(def => {
                const td = createCell(def, item, hiddenColumns.has(def.id));
                tr.appendChild(td);
            });
            return tr;
        }
        
        function createCell(def, item, isHidden) {
            const safeKey = def.id.replace(/\//g, '');
            const td = document.createElement('td');
            td.className = `col-${safeKey}`;
            if (isHidden) td.classList.add('is-hidden');
        
            if (def.type === 'resistIcon') {
                createResistCell(item, td);
            } else if (def.type === 'custom') {
                td.textContent = def.render(item);
            } else {
                td.textContent = item[def.id] || '';
            }
            return td;
        }
        
        function createResistCell(item, td) {
            const resistStr = String(item.耐性アイコン || '-').replace(/\r\n/g, '\n').split('\n');
            resistStr.forEach(row => {
                const keysInRow = row.split(',').map(k => k.trim()).filter(Boolean);
                const rowDiv = document.createElement('div');
                rowDiv.className = 'resist-row-inline';
        
                RESIST_TYPES.forEach(attr => {
                    const foundKey = keysInRow.find(k => k.startsWith(attr));
                    const el = foundKey && getIconPath(foundKey) ? Object.assign(document.createElement('img'), { src: getIconPath(foundKey), title: foundKey, className: 'icon-img' }) 
                                                                 : Object.assign(document.createElement('span'), { className: 'icon-text', textContent: '-' });
                    rowDiv.appendChild(el);
                });
                td.appendChild(rowDiv);
            });
        }
        
        
        // ==========================================
        // 7. 検索・フィルタリング・レンダリング
        // ==========================================
        
        function generateSearchRegex(rawKeyword) {
            if (!rawKeyword) return null;
            
            // 【修正箇所】 .replace(...) の過剰な補正を削除しました。
            // Wanakanaの標準のローマ字変換をそのまま使用します。
            let hiraConverted = wanakana.toHiragana(rawKeyword, { IMEMode: true });
            
            const tailMatch = hiraConverted.match(/([a-z]+)$/i);
            try {
                if (tailMatch) {
                    const tailAlpha = tailMatch[1].toLowerCase();
                    const prefix = escapeRegExp(hiraConverted.slice(0, -tailAlpha.length));
                    const regexSuffix = ROMAJI_TO_KANA_REGEX[tailAlpha];
                    return new RegExp(prefix + (regexSuffix !== undefined ? regexSuffix : escapeRegExp(tailAlpha)));
                } else {
                    return new RegExp(escapeRegExp(hiraConverted));
                }
            } catch (e) {
                return null;
            }
        }
        
        function getFilterContext() {
            const rawKeyword = AppState.filterState.text;
            const needsRegex = /[a-z]/i.test(rawKeyword);
        
            return {
                hasVisibleColumn: Object.values(AppState.columnState).some(v => v),
                activeResists: Array.from(AppState.filterState.resists),
                rawKeyword: rawKeyword,
                needsRegex: needsRegex,
                searchRegex: needsRegex ? generateSearchRegex(rawKeyword) : null
            };
        }
        
        function matchesFilter(item, ctx) {
            if (!ctx.hasVisibleColumn) return false;
        
            if (ctx.activeResists.length > 0) {
                if (!ctx.activeResists.every(r => item.resistIndex.has(r))) return false;
            }
        
            if (ctx.rawKeyword) {
                const isRawMatch = item.searchIndex.includes(ctx.rawKeyword);
                let isKanaMatch = false;
        
                if (ctx.needsRegex && ctx.searchRegex) {
                    isKanaMatch = item.よみがな && ctx.searchRegex.test(item.よみがな);
                } else if (!ctx.needsRegex) {
                    isKanaMatch = item.kanaIndex && item.kanaIndex.includes(ctx.rawKeyword);
                }
        
                if (!isRawMatch && !isKanaMatch) return false;
            }
        
            return true;
        }
        
        function renderVisibilityAndStripe(item, isVisible, visibleCount) {
            const tr = item.element;
            if (!tr) return;
        
            if (item.visible !== isVisible) {
                item.visible = isVisible;
                tr.classList.toggle('is-hidden', !isVisible);
            }
        
            if (isVisible) {
                const isEvenRow = (visibleCount % 2 === 1); 
                if (item.isEven !== isEvenRow) {
                    item.isEven = isEvenRow;
                    tr.classList.toggle('row-even', isEvenRow);
                }
            } else {
                if (item.isEven !== undefined) {
                    tr.classList.remove('row-even');
                    item.isEven = undefined;
                }
            }
        }
        
        function filterTable() {
            const ctx = getFilterContext();
            let visibleCount = 0;
        
            for (const item of AppState.currentData) {
                const isVisible = matchesFilter(item, ctx);
                if (isVisible) visibleCount++;
                renderVisibilityAndStripe(item, isVisible, visibleCount);
            }
        
            updateFooter(visibleCount, ctx.hasVisibleColumn);
        }
        
        function updateFooter(visibleCount, hasVisibleColumn) {
            DOM.searchCounter.textContent = `検索結果: ${visibleCount}件 / 全${AppState.currentData.length}件`;
        
            if (!DOM.noResultRow) return;
        
            if (!hasVisibleColumn) {
                DOM.noResultRow.classList.remove('is-hidden');
                DOM.noResultRow.innerHTML = `<td colspan="${COLUMN_DEFINITIONS.length}" class="msg-container"><span>選択項目がありません</span><br><button class="btn-action" data-action="resetView" style="margin-top:16px; display:inline-flex;">↺ ソート・表示項目の初期化</button></td>`;
            } else if (visibleCount === 0) {
                DOM.noResultRow.classList.remove('is-hidden');
                DOM.noResultRow.innerHTML = `<td colspan="${COLUMN_DEFINITIONS.length}" class="msg-container"><span>該当するデータが見つかりませんでした。</span><br><button class="btn-action" data-action="clearAllFilters" style="margin-top:16px; display:inline-flex;">✖ 検索・フィルターの全解除</button></td>`;
            } else {
                DOM.noResultRow.classList.add('is-hidden');
                DOM.noResultRow.innerHTML = '';
            }
        }
        
        
        // ==========================================
        // 8. ソート機能
        // ==========================================
        
        const SORTERS = {
            'default': (a, b) => a.defaultOrder - b.defaultOrder,
            'kana-asc': (a, b) => JA_COLLATOR.compare(a["よみがな"] || '', b["よみがな"] || '') || a.defaultOrder - b.defaultOrder,
            'kana-desc': (a, b) => JA_COLLATOR.compare(b["よみがな"] || '', a["よみがな"] || '') || a.defaultOrder - b.defaultOrder,
            'eng-asc': (a, b) => EN_COLLATOR.compare(a["マップ英語"] || '', b["マップ英語"] || '') || a.defaultOrder - b.defaultOrder,
            'eng-desc': (a, b) => EN_COLLATOR.compare(b["マップ英語"] || '', a["マップ英語"] || '') || a.defaultOrder - b.defaultOrder
        };
        
        // ソート処理のファサード（窓口）
        function applySort(mode, textName) {
            setSortMode(mode);
            updateSortUI(mode, textName);
            sortData();
            reorderRows();
            filterTable();
        }

        // 状態の更新
        function setSortMode(mode) {
            AppState.currentSort = mode; 
        }

        // UIの更新
        function updateSortUI(mode, textName) {
            document.querySelectorAll('[data-sort]').forEach(item => item.classList.remove('sort-active'));
            document.querySelector(`[data-sort="${mode}"]`)?.classList.add('sort-active');
            if (textName) DOM.btnSortText.innerText = `マップ名ソート: ${textName}`;
        }

        // データのソート
        function sortData() {
            const mode = AppState.currentSort;
            if (SORTERS[mode]) AppState.currentData.sort(SORTERS[mode]);
        }

        // DOMツリーへの並び順の反映
        function reorderRows() {
            const fragment = document.createDocumentFragment();
            AppState.currentData.forEach(item => {
                if (item.element) fragment.appendChild(item.element);
            });
            if (DOM.noResultRow) fragment.appendChild(DOM.noResultRow);
            
            DOM.tbody.appendChild(fragment);
        }
        
        
        // ==========================================
        // 9. 表示項目・UIリセット操作
        // ==========================================
        
        function updateButtonUI() {
            let visibleCount = 0;
            for (const key of Object.keys(AppState.columnState)) {
                const checkmark = document.querySelector(`[data-column="${key}"] .checkmark`);
                if (checkmark) checkmark.style.visibility = AppState.columnState[key] ? 'visible' : 'hidden';
                if (AppState.columnState[key]) visibleCount++;
            }
            DOM.btnColumnText.innerText = `表示項目: ${visibleCount}/${COLUMN_DEFINITIONS.length}`;
        }
        
        function updateColumnVisibility(columnKey, visible) {
            const safeKey = columnKey.replace(/\//g, '');
            document.querySelectorAll(`.col-${safeKey}`).forEach(el => el.classList.toggle('is-hidden', !visible));
        }
        
        function toggleColumn(stateKey) {
            if (AppState.columnState[stateKey] !== undefined) {
                AppState.columnState[stateKey] = !AppState.columnState[stateKey];
                updateColumnVisibility(stateKey, AppState.columnState[stateKey]);
                updateButtonUI();
                filterTable();
            }
        }
        
        function setAllColumns(visible) {
            Object.keys(AppState.columnState).forEach(k => {
                AppState.columnState[k] = visible;
                updateColumnVisibility(k, visible);
            });
            updateButtonUI();
            filterTable();
        }
        
        function clearSearchText(skipFilter = false) {
            DOM.searchInput.value = '';
            AppState.filterState.text = '';
            if (!skipFilter) {
                filterTable();
                DOM.searchInput.focus();
            }
        }
        
        function clearAllFilters() {
            clearSearchText(true); 
            AppState.filterState.resists.clear();
            document.querySelectorAll('.icon-wrapper').forEach(w => w.classList.remove('active'));
            DOM.resistGrid.classList.remove('has-active');
            filterTable(); 
        }
        
        function resetView() {
            applySort('default', '初期順');
        
            COLUMN_DEFINITIONS.forEach(def => {
                AppState.columnState[def.id] = def.defaultVisible;
                updateColumnVisibility(def.id, def.defaultVisible);
            });
            
            updateButtonUI();
            filterTable();
        }
    </script>
</body>
</html>
