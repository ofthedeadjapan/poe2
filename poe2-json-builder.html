<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoE2 JSON Generator</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* --- 共通化によって、ここにあった大量のCSSは削除されました --- */

    textarea {
      display: block;
      width: 100%;
      height: 200px;
      background-color: rgba(0, 0, 0, 0.2);
      color: white;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
      resize: vertical;
      transition: all 0.2s;
      white-space: pre;
      overflow-x: auto;
    }

    textarea:focus {
      outline: none;
      border-color: #ffffff;
      box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.2);
    }

    textarea::placeholder {
      color: var(--separator-color);
    }

    #errorMessage {
      width: 100%;
      color: #fca5a5;
      font-weight: bold;
      white-space: pre-wrap;
    }

    #errorMessage:empty {
      display: none;
    }

    .table-wrapper {
      max-height: 500px;
    }

    #outputJsonArea {
      height: 300px;
      background-color: #171514;
    }
  </style>
</head>

<body data-page="json-builder">
  <div class="page-container">
    <nav class="nav-container">
      <a href="poe2-index.html" class="nav-link">Index</a>
      <a href="poe2-campaign.html" class="nav-link">キャンペーン</a>
      <a href="poe2-endgame-maps.html" class="nav-link">エンドゲームマップ</a>
      <a href="poe2-memo.html" class="nav-link">メモ</a>
      <a href="poe2-json-builder.html" class="nav-link active">JSON Builder</a>
    </nav>
    <header class="page-header">
      <h1>PoE2 JSON Generator</h1>
    </header>
    <main class="main-content">
      <div class="controls-wrapper">
        <textarea id="inputArea"
          placeholder="スプレッドシートからコピーしたTSVデータをここに貼り付けてください...&#10;※ボスやバフなど、出力したい単一のシートのデータを貼り付けます"></textarea>
        <div id="errorMessage"></div>
        <div class="separator-horizontal"></div>

        <div class="control-bar">
          <button class="btn-action" onclick="processData()">TSVデータをJSONに変換</button>
          <button id="copyBtn" class="btn-action" onclick="copyJSON()">📋 JSONをコピー</button>
          <button class="btn-danger ml-auto" onclick="resetForm()">✖ リセット</button>
        </div>
      </div>
      <div id="previewContainer"></div>
      <div class="controls-wrapper">
        <h3 style="margin-top:0; color:var(--text-muted);">JSON出力コード (プレビュー)</h3>
        <textarea id="outputJsonArea" readonly placeholder="変換されたJSONコードがここに表示されます..."></textarea>
      </div>
    </main>
  </div>
  <script>
    const DOM = {
      inputArea: document.getElementById('inputArea'),
      outputJsonArea: document.getElementById('outputJsonArea'),
      errorMessage: document.getElementById('errorMessage'),
      previewContainer: document.getElementById('previewContainer'),
      copyBtn: document.getElementById('copyBtn')
    };
    let currentJson = null;
    let copyTimer = null;

    DOM.inputArea.addEventListener('input', () => {
      DOM.errorMessage.textContent = '';
    });

    function parseTSV(text) {
      const rows = [];
      let row = [], cell = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i], nextChar = text[i + 1];
        if (char === '"') {
          if (inQuotes && nextChar === '"') { cell += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (char === '\t' && !inQuotes) {
          row.push(cell); cell = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && nextChar === '\n') i++;
          row.push(cell); rows.push(row); row = []; cell = '';
        } else { cell += char; }
      }
      if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
      if (inQuotes) throw new Error("引用符（\"）が閉じられていません。");
      return rows;
    }

    function formatValue(val) {
      if (val == null) return '';
      const str = val.trim();
      if (str === '') return '';

      if (str.includes('||')) {
        return str.split('||')
          .map(item => formatValue(item))
          .filter(item => item !== '');
      }

      const lower = str.toLowerCase();
      if (lower === 'true') return true;
      if (lower === 'false') return false;

      const num = Number(str);
      if (!Number.isNaN(num)) {
        return num;
      }

      return str;
    }

    function processData() {
      resetUI();
      try {
        const text = DOM.inputArea.value;
        if (!text.trim()) throw new Error("データが入力されていません");

        const rawData = parseTSV(text);
        const validRows = rawData.filter(row => row.some(cell => cell && cell.trim() !== ''));
        if (validRows.length < 2) throw new Error("有効なデータが存在しない、またはヘッダーしかありません");

        const headers = validRows[0].map(h => h ? h.trim() : '');
        const duplicateHeaders = headers.filter((h, i) => h && headers.indexOf(h) !== i);
        if (duplicateHeaders.length > 0) {
          const uniqueDups = [...new Set(duplicateHeaders)];
          throw new Error("⚠ 列名が重複しています: " + uniqueDups.join(', '));
        }

        const idIndex = headers.findIndex(h => h.toLowerCase() === 'id');
        if (idIndex === -1) {
          throw new Error("ID列が見つかりません。");
        }

        const dataList = [];
        const seenIds = new Set();
        const headerLen = headers.length;

        for (let i = 1; i < validRows.length; i++) {
          const row = validRows[i];
          const rawId = row[idIndex];
          if (rawId == null || rawId.trim() === '') continue;

          const idValue = rawId.trim().toLowerCase();
          if (seenIds.has(idValue)) {
            throw new Error(`⚠ IDが重複しています: ${idValue}`);
          }
          seenIds.add(idValue);

          const obj = {};
          for (let j = 0; j < headerLen; j++) {
            const h = headers[j];
            if (!h) continue;
            obj[h] = (j === idIndex) ? idValue : formatValue(row[j]);
          }
          dataList.push(obj);
        }

        currentJson = dataList;
        DOM.outputJsonArea.value = JSON.stringify(currentJson, null, 2);

        const fragment = document.createDocumentFragment();
        renderPreviewTable(dataList, headers.filter(Boolean), "データ プレビュー", fragment);
        DOM.previewContainer.appendChild(fragment);
      } catch (e) {
        DOM.errorMessage.textContent = e.message;
      }
    }

    function renderPreviewTable(dataArray, headers, titleText, parentFragment) {
      if (dataArray.length === 0) return;

      const MAX_PREVIEW = 100;
      const displayCount = Math.min(dataArray.length, MAX_PREVIEW);

      const title = document.createElement('h3');
      title.textContent = dataArray.length > MAX_PREVIEW
        ? `${titleText} (全 ${dataArray.length} 件中 / 先頭 ${MAX_PREVIEW} 件)`
        : `${titleText} (${dataArray.length} 件)`;

      const wrapper = document.createElement('div');
      wrapper.className = 'table-wrapper';

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const tbody = document.createElement('tbody');

      const trHead = document.createElement('tr');
      for (const h of headers) {
        const th = document.createElement('th');
        th.textContent = h;
        trHead.appendChild(th);
      }
      thead.appendChild(trHead);

      for (let i = 0; i < displayCount; i++) {
        const obj = dataArray[i];
        const tr = document.createElement('tr');
        for (const h of headers) {
          const td = document.createElement('td');
          const val = obj[h];
          td.textContent = Array.isArray(val) ? val.join(', ') : val;
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }

      table.appendChild(thead);
      table.appendChild(tbody);
      wrapper.appendChild(table);

      parentFragment.appendChild(title);
      parentFragment.appendChild(wrapper);
    }

    async function copyJSON() {
      if (!currentJson) return;

      const btn = DOM.copyBtn;
      const originalText = "📋 JSONをコピー";

      if (copyTimer) clearTimeout(copyTimer);

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(DOM.outputJsonArea.value);
          btn.innerHTML = "✅ コピーしました";
          btn.style.color = "#86efac";
        } else {
          throw new Error("Clipboard API not available");
        }
      } catch (e) {
        DOM.outputJsonArea.select();
        btn.innerHTML = "⚠ Ctrl+Cでコピーしてください";
        btn.style.color = "#fca5a5";
      }

      copyTimer = setTimeout(() => {
        btn.innerHTML = originalText;
        btn.style.color = "";
      }, 2000);
    }

    function resetUI() {
      DOM.errorMessage.textContent = '';
      DOM.previewContainer.innerHTML = '';
      DOM.outputJsonArea.value = '';
      currentJson = null;
    }

    function resetForm() {
      DOM.inputArea.value = '';
      resetUI();
    }
  </script>
</body>

</html>
