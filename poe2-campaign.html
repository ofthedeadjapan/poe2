<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoE2 アクトボス・バフ攻略リスト</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* ==========================================================================
 キャンペーンページ固有スタイル
 ========================================================================== */

    .act-nav-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .act-nav-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-left: auto;
    }

    @media (max-width: 767px) {
      .act-nav-buttons {
        margin-left: 0;
      }
    }

    /* ==========================================================================
  アクトナビゲーション (目次)
  ========================================================================== */
    .act-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* 【修正後】以下のプロパティに display, align-items, justify-content, line-height を追加します */
    .act-nav-link {
      background-color: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 8px 16px;
      font-size: 15px;
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .act-nav-link:hover {
      border-color: var(--accent-gold);
      color: #ffffff;
      background-color: rgba(203, 166, 95, 0.1);
      transform: translateY(-1px);
    }

    /* ==========================================================================
  アコーディオンセクション (Accordion)
  ========================================================================== */
    .act-section {
      background-color: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    .act-header {
      background-color: var(--bg-th);
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      transition: background-color 0.2s ease;
    }

    .act-header:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }

    .act-section.is-open .act-header {
      border-bottom: 1px solid var(--border-color);
    }

    .act-header h2 {
      margin: 0;
      padding: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .toggle-icon-text {
      font-size: 14px;
      color: var(--text-muted);
    }

    .act-content {
      display: none;
      padding: 20px;
    }

    .act-section.is-open .act-content {
      display: block;
    }

    /* ==========================================================================
  永続バフチェックリスト (Buff List Table)
   ========================================================================== */
    .buff-list-wrapper {
      margin-bottom: 20px;
    }

    .buff-list-title {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: var(--accent-gold);
      font-weight: 600;
    }

    .buff-table-wrapper {
      width: 100%;
      overflow-x: auto;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      background-color: var(--bg-table);
      box-shadow: var(--shadow-md);
    }

    .buff-row {
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .buff-row.is-checked {
      color: var(--text-muted);
      text-decoration: line-through;
      opacity: 0.5;
      background-color: rgba(0, 0, 0, 0.2);
    }

    .buff-checkbox {
      cursor: pointer;
      width: 16px;
      height: 16px;
    }

    /* 永続バフ 選択式リスト用のスタイル */
    .buff-choice-container {
      padding: 4px 0;
    }

    .buff-choice-label {
      font-size: 13px;
      color: var(--accent-gold);
      margin-bottom: 6px;
      font-weight: bold;
      display: inline-block;
      border-bottom: 1px solid rgba(203, 166, 95, 0.3);
    }

    .buff-choice-list {
      margin: 0;
      padding-left: 20px;
      list-style-type: disc;
    }

    .buff-choice-list li {
      margin-bottom: 10px;
      line-height: 1.5;
      color: var(--text-main);
    }

    .buff-choice-list li:last-child {
      margin-bottom: 0;
    }

    /* ==========================================================================
  データテーブル固有設定 & JS動的生成クラス
  ========================================================================== */

    .th-sub {
      font-size: 12px;
      color: #94a3b8;
      font-weight: normal;
    }

    .boss-item-wrapper.has-image {
      cursor: pointer;
      display: inline-flex;
      flex-direction: column;
    }

    .boss-item-wrapper.has-image .lang-ja,
    .boss-item-wrapper.has-image .lang-en {
      color: var(--accent-gold);
      text-decoration: underline dotted rgba(203, 166, 95, 0.5);
      text-underline-offset: 3px;
    }

    .boss-item-wrapper.has-image:hover .lang-ja,
    .boss-item-wrapper.has-image:hover .lang-en {
      color: var(--accent-gold-hover);
      text-decoration-style: solid;
    }

    .area-level {
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ==========================================================================
  フローティング 目次へ戻るボタン
  ========================================================================== */
    .btn-back-to-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background-color: var(--accent-gold);
      color: #1c1917;
      border: none;
      border-radius: 50px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      cursor: pointer;
      transition: opacity 0.3s ease, transform 0.2s ease, visibility 0.3s ease, background-color 0.2s ease;
    }

    .btn-back-to-top:hover {
      transform: translateY(-2px);
      background-color: var(--accent-gold-hover);
    }

    .btn-back-to-top.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(10px);
    }
  </style>
</head>

<body>
  <div class="page-container">

    <nav class="nav-container">
      <a href="poe2-index.html" class="nav-link">Index</a>
      <a href="poe2-campaign.html" class="nav-link active">キャンペーン</a>
      <a href="poe2-endgame-maps.html" class="nav-link">エンドゲームマップ</a>
      <a href="poe2-memo.html" class="nav-link">メモ</a>
      <a href="poe2-json-builder.html" class="nav-link">JSON Builder</a>
    </nav>

    <header class="page-header">
      <h1>PoE2 キャンペーン</h1>
    </header>

    <main class="main-content">

      <div class="controls-wrapper">
        <div class="control-bar">
          <div class="dropdown-container dropdown">
            <button type="button" class="btn-dropdown" aria-haspopup="menu" aria-expanded="false">
              <span class="btn-icon">◈</span>
              <span class="btn-dropdown-content">マップ・ボス名：<span id="btn-format-text">日＋英</span></span>
              <span>▼</span>
            </button>
            <div class="dropdown-menu dropdown-content">
              <div class="dropdown-item is-active" data-click="setFormat" data-format="ja-en">
                <span class="checkmark">✔</span>日＋英
              </div>
              <div class="dropdown-item" data-click="setFormat" data-format="en-ja">
                <span class="checkmark">✔</span>英＋日
              </div>
              <div class="dropdown-item" data-click="setFormat" data-format="ja-only">
                <span class="checkmark">✔</span>日のみ
              </div>
              <div class="dropdown-item" data-click="setFormat" data-format="en-only">
                <span class="checkmark">✔</span>英のみ
              </div>
            </div>
          </div>

          <button type="button" id="btnResetBuffs" class="btn-action btn-base ml-auto">↺ 永続バフリセット</button>
        </div>

        <div class="separator-horizontal"></div>

        <div class="act-nav-row">
          <div id="actNav" class="act-nav"></div>

          <div class="act-nav-buttons">
            <button type="button" id="btnOpenAll" class="btn-action btn-base">▼ 各アクト開く</button>
            <button type="button" id="btnCloseAll" class="btn-action btn-base">▲ 各アクト閉じる</button>
          </div>
        </div>

        <div id="campaignContainer">
          <p style="text-align: center; color: var(--text-muted); padding: 40px 0;">データを読み込み中...</p>
        </div>
    </main>
  </div>

  <button type="button" id="btnBackToTop" class="btn-back-to-top is-hidden">↑ 目次へ</button>

  <div id="boss-preview" class="boss-preview is-hidden">
    <img id="boss-preview-img" alt="">
  </div>

  <div id="boss-modal" class="modal-overlay">
    <div class="modal-content">
      <button type="button" class="modal-close btn-base" data-click="closeModal" aria-label="閉じる">✕</button>
      <img id="boss-modal-img" src="" alt="ボス画像" class="modal-image" loading="lazy">
    </div>
  </div>

  <script type="module" src="js/poe2-campaign.js"></script>
</body>

</html>
