<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE2 アクトボス・バフ攻略リスト</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* ==========================================================================
     1. 基盤設定 & 変数 (Base & Layout)
     ========================================================================== */
        :root {
            --resist-empty-bg: rgba(var(--color-empty), 0.04);
            --resist-empty-border: rgba(var(--color-empty), 0.08);
            --resist-normal-bg: rgba(var(--color-normal), 0.1);
            --resist-normal-border: rgb(var(--color-normal), 0.55);
            --resist-weak-bg: rgba(var(--color-weak), 0.15);
            --resist-weak-border: rgb(var(--color-weak), 0.55);
            --resist-strong-bg: rgba(var(--color-strong), 0.15);
            --resist-strong-border: rgb(var(--color-strong), 0.55);

            --btn-dropdown-width: 240px;

            --white04: rgba(255, 255, 255, 0.04);
            --white05: rgba(255, 255, 255, 0.05);
            --white10: rgba(255, 255, 255, 0.1);
            --white20: rgba(255, 255, 255, 0.2);
            --white30: rgba(255, 255, 255, 0.3);
            --white50: rgba(255, 255, 255, 0.5);

            --black20: rgba(0, 0, 0, 0.2);
            --black50: rgba(0, 0, 0, 0.5);
            --black60: rgba(0, 0, 0, 0.6);
            --black80: rgba(0, 0, 0, 0.8);
            --black85: rgba(0, 0, 0, 0.85);
            --black90: rgba(0, 0, 0, 0.9);

            --transition-fast: 0.15s ease;
        }

        button:focus-visible,
        a:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--accent-gold);
            outline-offset: 2px;
        }

        .is-hidden {
            display: none !important;
        }

        .ml-auto {
            margin-left: auto !important;
        }

        /* ==========================================
     2. コントロールパネル & 区切り線 (Controls)
     ========================================== */
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
            background-color: var(--bg-panel);
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px var(--black50);
        }

        .control-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
        }

        .separator-horizontal {
            width: 100%;
            height: 1px;
            background-color: rgba(87, 83, 78, .4);
        }

        /* ==========================================
     3. ボタン & ドロップダウン (Buttons & Dropdowns)
     ========================================== */
        .btn-base {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-action {
            height: 44px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            transition: all var(--transition-normal);
            outline: none;
            gap: 6px;
            padding: 0 16px;
            white-space: nowrap;
            flex-shrink: 0;
            background: var(--btn-action-bg);
            border: 1px solid var(--btn-action-border);
            color: #e8c88a;
        }

        .btn-action:active {
            transform: translateY(1px);
        }

        .btn-action:hover {
            background-color: var(--btn-action-bg-hover);
            color: #fff;
            filter: drop-shadow(0 0 10px rgba(210, 150, 70, .3));
        }

        .dropdown-container {
            position: relative;
            width: var(--btn-dropdown-width);
        }

        .btn-dropdown {
            width: 100%;
            height: 44px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 0 14px;
            background-color: var(--bg-th);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-main);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color var(--transition-normal), border-color var(--transition-normal);
            outline: none;
        }

        .btn-dropdown:hover {
            background-color: var(--white04);
            border-color: var(--separator-color);
        }

        .btn-dropdown:active {
            transform: translateY(1px);
        }

        .btn-dropdown-content {
            text-align: center;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .dropdown.show .btn-dropdown {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-bottom-color: transparent;
            background-color: var(--bg-panel);
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-top: none;
            border-bottom-left-radius: var(--radius-md);
            border-bottom-right-radius: var(--radius-md);
            z-index: 100;
            box-shadow: 0 10px 25px var(--black80);
            padding: 8px;
            margin-top: 0;
        }

        .dropdown.show .dropdown-menu {
            display: block;
        }

        .dropdown-item {
            padding: 10px 16px;
            font-size: 15px;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: var(--radius-sm);
            user-select: none;
            transition: background-color var(--transition-normal);
            white-space: nowrap;
        }

        .dropdown-item:hover {
            background-color: var(--bg-th);
            color: #ffffff;
        }

        .dropdown-item .checkmark {
            width: 18px;
            font-weight: bold;
            color: var(--btn-on);
            visibility: hidden;
        }

        .dropdown-item.sort-active {
            color: var(--btn-sort-active);
            font-weight: 700;
        }

        .dropdown-item.sort-active .checkmark {
            visibility: visible;
        }

        /* ==========================================================================
     4. アクトナビゲーション (目次)
     ========================================================================== */
        .act-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .act-nav-link {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            font-size: 15px;
            text-decoration: none;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
            font-weight: bold;
        }

        .act-nav-link:hover {
            border-color: var(--accent-gold);
            color: #ffffff;
            background-color: rgba(203, 166, 95, 0.1);
            transform: translateY(-1px);
        }

        /* ==========================================================================
     5. アコーディオンセクション (Accordion)
     ========================================================================== */
        .act-section {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .act-header {
            background-color: var(--bg-th);
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background-color 0.2s ease;
        }

        .act-header:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .act-section.is-open .act-header {
            border-bottom: 1px solid var(--border-color);
        }

        .act-header h2 {
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
            text-decoration: none !important;
            font-size: 18px !important;
            color: #ffffff;
            font-weight: 600;
            line-height: 1.2 !important;
        }

        .toggle-icon-text {
            font-size: 14px;
            color: var(--text-muted);
        }

        .act-content {
            display: none;
            padding: 20px;
        }

        .act-section.is-open .act-content {
            display: block;
        }

        /* ==========================================================================
     6. 永続バフチェックリスト (Buff List Table)
     ========================================================================== */
        .buff-list-wrapper {
            margin-bottom: 20px;
        }

        .buff-list-title {
            margin: 0 0 12px 0;
            font-size: 15px;
            color: var(--accent-gold);
            font-weight: 600;
        }

        .buff-table-wrapper {
            width: 100%;
            overflow-x: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background-color: var(--bg-table);
        }

        .buff-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        .buff-table th,
        .buff-table td {
            border-bottom: 1px solid var(--border-color);
            padding: 12px;
            vertical-align: middle;
        }

        .buff-table tr:last-child td {
            border-bottom: none;
        }

        .buff-table th {
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
            font-weight: 600;
            text-align: left;
            white-space: nowrap;
        }

        .buff-row {
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .buff-row:nth-child(even) {
            background-color: var(--bg-tr-even);
        }

        .buff-row:hover {
            background-color: var(--bg-tr-hover);
        }

        .buff-row.is-checked {
            color: var(--text-muted);
            text-decoration: line-through;
            opacity: 0.5;
            background-color: rgba(0, 0, 0, 0.2);
        }

        .buff-checkbox {
            cursor: pointer;
            width: 16px;
            height: 16px;
            pointer-events: none;
            /* 行全体のクリックイベントに任せる */
        }

        /* ==========================================================================
         永続バフ 選択式リスト用のスタイル
         ========================================================================== */
        .buff-choice-container {
            padding: 4px 0;
        }

        .buff-choice-label {
            font-size: 13px;
            color: var(--accent-gold);
            margin-bottom: 6px;
            font-weight: bold;
            display: inline-block;
            border-bottom: 1px solid rgba(203, 166, 95, 0.3);
        }

        .buff-choice-list {
            margin: 0;
            padding-left: 20px;
            list-style-type: disc;
        }

        .buff-choice-list li {
            margin-bottom: 10px;
            /* 選択肢ごとの余白 */
            line-height: 1.5;
            color: var(--text-main);
        }

        /* 最後の選択肢の下には余白を作らない */
        .buff-choice-list li:last-child {
            margin-bottom: 0;
        }

        /* ==========================================================================
     7. データテーブル & 言語サイズ制御 (Table & Typography)
     ========================================================================== */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background-color: var(--bg-table);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 15px;
        }

        th,
        td {
            border-bottom: 1px solid var(--border-color);
            padding: 12px;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        th {
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
            font-weight: 600;
            text-align: left;
            white-space: nowrap;
        }

        /* ヘッダー小文字用（カッコ内など） */
        .th-sub {
            font-size: 12px;
            color: #94a3b8;
            font-weight: normal;
        }

        tr:nth-child(even) {
            background-color: var(--bg-tr-even);
        }

        tr:hover {
            background-color: var(--bg-tr-hover);
        }

        /* 主従切り替え用 フォント制御 */
        .cell-lang-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .lang-ja {
            font-size: 15px;
            color: var(--text-main);
            order: 1;
        }

        .lang-en {
            font-size: 13px;
            color: var(--text-muted);
            order: 2;
        }

        body.lang-en-main .lang-ja,
        body.lang-en-only .lang-ja {
            font-size: 13px;
            color: var(--text-muted);
            order: 2;
        }

        body.lang-en-main .lang-en,
        body.lang-en-only .lang-en {
            font-size: 15px;
            color: var(--text-main);
            font-weight: 600;
            order: 1;
        }

        body.lang-ja-only .lang-en {
            display: none !important;
        }

        body.lang-en-only .lang-ja {
            display: none !important;
        }

        /* ボスリンク */
        .boss-item-wrapper {
            padding: 4px 0;
        }

        .boss-item-wrapper:first-child {
            padding-top: 0;
        }

        .boss-item-wrapper:last-child {
            padding-bottom: 0;
        }

        .boss-item-wrapper.has-image {
            cursor: pointer;
            display: inline-flex;
            flex-direction: column;
        }

        .boss-item-wrapper.has-image .lang-ja,
        .boss-item-wrapper.has-image .lang-en {
            color: var(--accent-gold);
            text-decoration: underline dotted rgba(203, 166, 95, 0.5);
            text-underline-offset: 3px;
        }

        .boss-item-wrapper.has-image:hover .lang-ja,
        .boss-item-wrapper.has-image:hover .lang-en {
            color: var(--accent-gold-hover);
            text-decoration-style: solid;
        }

        .cell-memo,
        .cell-atk-type {
            font-size: 15px;
            color: var(--text-main);
            line-height: 1.5;
        }

        /* ==========================================================================
     8. 耐性アイコン 6枠固定グリッド (Resist Icons Grid)
     ========================================================================== */
        .resist-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            width: 176px;
        }

        .resist-slot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .resist-slot.is-empty {
            background-color: var(--resist-empty-bg);
            border: 1px solid var(--resist-empty-border);
        }

        .resist-slot.is-normal {
            background-color: var(--resist-normal-bg);
            border: 1px solid var(--resist-normal-border);
        }

        .resist-slot.is-weak {
            background-color: var(--resist-weak-bg);
            border: 1px solid var(--resist-weak-border);
        }

        .resist-slot.is-strong {
            background-color: var(--resist-strong-bg);
            border: 1px solid var(--resist-strong-border);
        }

        .resist-icon {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 2px;
        }

        @media (max-width: 768px) {
            .resist-grid {
                grid-template-columns: repeat(3, 1fr);
                width: 86px;
            }

            .control-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .dropdown-container {
                width: 100%;
            }

            .ml-auto {
                margin-left: 0 !important;
            }
        }

        /* ==========================================================================
     9. ポップアッププレビュー & モーダル (Preview & Modal)
     ========================================================================== */
        .boss-preview {
            position: fixed;
            pointer-events: none;
            z-index: 2000;
            background: #1c1917;
            border: 2px solid var(--accent-gold);
            border-radius: var(--radius-sm);
            padding: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            max-width: 280px;
            transition: opacity 0.15s ease;
            opacity: 0;
        }

        .boss-preview.show {
            opacity: 1;
        }

        .boss-preview.is-hidden {
            display: none;
        }

        .boss-preview img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 2px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal-image {
            display: block;
            max-width: 100%;
            max-height: 85vh;
            border: 3px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
        }

        /* ==========================================================================
     10. フローティング 目次へ戻るボタン
     ========================================================================== */
        .btn-back-to-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: var(--accent-gold);
            color: #1c1917;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            z-index: 1000;
            transition: opacity 0.3s ease, transform 0.2s ease, visibility 0.3s ease, background-color 0.2s ease;
        }

        .btn-back-to-top:hover {
            transform: translateY(-2px);
            background-color: var(--accent-gold-hover);
        }

        .btn-back-to-top.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(10px);
        }
    </style>
</head>

<body>
    <div class="page-container">

        <nav class="nav-container">
            <a href="poe2-index.html" class="nav-link">Index</a>
            <a href="poe2-campaign.html" class="nav-link active">アクト</a>
            <a href="poe2-endgame-maps.html" class="nav-link">エンドゲームマップ</a>
            <a href="poe2-memo.html" class="nav-link">メモ</a>
            <a href="poe2-json-builder.html" class="nav-link">JSON Builder</a>
        </nav>

        <header class="page-header">
            <h1>アクトボス・バフリスト（改善中）</h1>
        </header>

        <main class="main-content">

            <div class="controls-wrapper">
                <div class="control-bar">
                    <div class="dropdown-container dropdown">
                        <button type="button" class="btn-dropdown" aria-haspopup="menu" aria-expanded="false">
                            <span class="btn-icon">◈</span>
                            <span class="btn-dropdown-content">マップ・ボス名: <span id="btn-format-text">日＋英</span></span>
                            <span>▼</span>
                        </button>
                        <div class="dropdown-menu dropdown-content">
                            <div class="dropdown-item sort-active" data-click="setFormat" data-format="both-ja">
                                <span class="checkmark" style="visibility:visible;">✔</span>日＋英
                            </div>
                            <div class="dropdown-item" data-click="setFormat" data-format="both-en">
                                <span class="checkmark" style="visibility:hidden;">✔</span>英＋日
                            </div>
                            <div class="dropdown-item" data-click="setFormat" data-format="ja">
                                <span class="checkmark" style="visibility:hidden;">✔</span>日のみ
                            </div>
                            <div class="dropdown-item" data-click="setFormat" data-format="en">
                                <span class="checkmark" style="visibility:hidden;">✔</span>英のみ
                            </div>
                        </div>
                    </div>

                    <button type="button" id="btnOpenAll" class="btn-action btn-base ml-auto">▼ すべて開く</button>
                    <button type="button" id="btnCloseAll" class="btn-action btn-base">▲ すべて閉じる</button>
                </div>

                <div class="separator-horizontal"></div>

                <div id="actNav" class="act-nav"></div>
            </div>

            <div id="campaignContainer">
                <p style="text-align: center; color: var(--text-muted); padding: 40px 0;">データを読み込み中...</p>
            </div>
        </main>
    </div>

    <button type="button" id="btnBackToTop" class="btn-back-to-top is-hidden">↑ 目次へ</button>

    <div id="bossPreview" class="boss-preview is-hidden">
        <img id="bossPreviewImg" src="" alt="">
    </div>

    <div id="bossModal" class="modal-overlay">
        <div class="modal-content">
            <button type="button" class="modal-close" data-click="closeModal">✕</button>
            <img id="bossModalImg" src="" alt="ボス画像" class="modal-image" loading="lazy">
        </div>
    </div>

    <script src="js/poe2-campaign.js" defer></script>
</body>
