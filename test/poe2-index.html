<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="nav.js" defer></script><title>PoE2 Index</title>
    <style>
        /* =========================================
           CSS変数（poe2mapboss準拠）
        ========================================= */
        :root {
            --bg-body: #1c1917;
            --bg-panel: #292524;
            --text-main: #e7e5e4;
            --text-muted: #a8a29e;
            --border-color: #57534e;
            --accent-gold: #cba65f;
            --accent-gold-hover: #fef08a;
            --radius-md: 12px;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px; /* 全体の上下余白を少し調整 */
            line-height: 1.6;
        }

        /* --- Index用メインコンテナ --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: var(--bg-panel);
            padding: 30px 40px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            text-align: center;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap; /* 画面が狭い時に旧リンクを折り返す */
        }

        a.menu-link {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            padding: 10px 15px;
            border-radius: 8px;
            background-color: rgba(203, 166, 95, 0.05);
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        a.menu-link:hover {
            color: var(--accent-gold-hover);
            background-color: rgba(203, 166, 95, 0.15);
            border-color: var(--accent-gold);
            transform: translateX(4px);
        }

        a.menu-link::before {
            content: "▶";
            font-size: 12px;
            color: var(--text-muted);
            margin-right: 12px;
            transition: color 0.2s ease;
        }

        a.menu-link:hover::before {
            color: var(--accent-gold-hover);
        }

        /* --- 旧リンクのスタイル調整（いい感じのサブボタン化） --- */
        a.old-link {
            font-size: 13px;
            color: var(--text-muted);
            background-color: transparent;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
        }

        /* 旧リンクは▶アイコンを消す */
        a.old-link::before {
            content: none;
        }

        a.old-link:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px); /* 横ではなく少し浮かすだけにする */
        }
    </style>
<script src="nav.js" defer></script>
</head><body>

<div id="nav-placeholder"></div>
    <!-- 既存のコンテンツ -->

        <h1>データ</h1>
        <ul>

            <li>
                <div class="link-wrapper">
                    <a href="poe2-endgame-maps.html" class="menu-link">PoE2 エンドゲームマップ</a>
                    <a href="poe2mapboss.html" class="menu-link old-link">（旧）PoE2マップボスリスト</a>
                </div>
            </li>
            <li><a href="poe2-memo.html" class="menu-link">PoE2 メモ</a></li>
            <li><a href="poe2-json-builder.html" class="menu-link">PoE2 JSON Builder</a></li>
        </ul>
    </div>
</body>
</html>
