<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE2 Index</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="js/nav.js" defer></script>
    <style>
        /* =========================================
           ローカルCSS (ページ固有のスタイル)
        ========================================= */

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap; /* 画面が狭い時に旧リンクを折り返す */
        }

        a.menu-link {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            padding: 10px 15px;
            border-radius: 8px;
            background-color: rgba(203, 166, 95, 0.05);
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        a.menu-link:hover {
            color: var(--accent-gold-hover);
            background-color: rgba(203, 166, 95, 0.15);
            border-color: var(--accent-gold);
            transform: translateX(4px);
        }

        a.menu-link::before {
            content: "▶";
            font-size: 12px;
            color: var(--text-muted);
            margin-right: 12px;
            transition: color 0.2s ease;
        }

        a.menu-link:hover::before {
            color: var(--accent-gold-hover);
        }

        /* --- 旧リンクのスタイル調整（いい感じのサブボタン化） --- */
        a.old-link {
            font-size: 13px;
            color: var(--text-muted);
            background-color: transparent;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
        }

        /* 旧リンクは▶アイコンを消す */
        a.old-link::before {
            content: none;
        }

        a.old-link:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px); /* 横ではなく少し浮かすだけにする */
        }
    </style>
</head>

<body>
    <div class="page-container">

        <div id="nav-placeholder"></div>

        <header class="page-header">
            <h1>Index</h1>
        </header>

        <main class="main-content">
            <div class="main-panel">
                <ul>
                    <li><a href="poe2-campaign.html" class="menu-link">PoE2 アクトボス</a></li>
                    <li>
                        <div class="link-wrapper">
                            <a href="poe2-endgame-maps.html" class="menu-link">PoE2 エンドゲームマップ</a>
                            <a href="poe2mapboss.html" class="menu-link old-link">（旧）PoE2マップボスリスト</a>
                        </div>
                    </li>
                    <li><a href="poe2-memo.html" class="menu-link">PoE2 メモ</a></li>
                    <li><a href="poe2-json-builder.html" class="menu-link">PoE2 JSON Builder</a></li>
                </ul>
            </div>
        </main>

    </div>
</body>

</html>
