<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE2 アクトボスリスト</title>
    <style>
        /* =========================================
           CSS変数（poe2mapboss準拠）
        ========================================= */
        :root {
            --bg-body: #1c1917;
            --bg-panel: #292524;
            --text-main: #e7e5e4;
            --text-muted: #a8a29e;
            --border-color: #57534e;
            --accent-gold: #cba65f;
            --radius-md: 12px;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px; /* 左上ボタンのために余白調整 */
            line-height: 1.5;
        }

        /* 左上に固定するための戻るボタン設定 */
        .header-nav {
            margin-bottom: 20px;
            margin-left: 10px;
        }

        a.back-link {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        
        a.back-link:hover { 
            color: #fef08a; 
            transform: translateX(-4px); 
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--bg-panel);
            padding: 30px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            text-align: center;
        }

        .content {
            color: var(--text-muted);
            text-align: center;
            padding: 40px 0;
            font-size: 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header-nav">
        <a href="poe2index.html" class="back-link">
            <svg style="width:18px;height:18px;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Indexに戻る
        </a>
    </div>

    <div class="container">
        <h1>アクトボスリスト</h1>
        <div class="content">
            えいいさくせいちゅう        </div>
    </div>
</body>
</html>
