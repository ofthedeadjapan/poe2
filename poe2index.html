<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE2 Index</title>
    <style>
        /* =========================================
           CSS変数（poe2mapboss準拠）
        ========================================= */
        :root {
            --bg-body: #1c1917;
            --bg-panel: #292524;
            --text-main: #e7e5e4;
            --text-muted: #a8a29e;
            --border-color: #57534e;
            --accent-gold: #cba65f;
            --accent-gold-hover: #fef08a;
            --radius-md: 12px;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--bg-panel);
            padding: 30px 40px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            text-align: center;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        a.menu-link {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            padding: 10px 15px;
            border-radius: 8px;
            background-color: rgba(203, 166, 95, 0.05);
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        a.menu-link:hover {
            color: var(--accent-gold-hover);
            background-color: rgba(203, 166, 95, 0.15);
            border-color: var(--accent-gold);
            transform: translateX(4px);
        }

        a.menu-link::before {
            content: "▶";
            font-size: 12px;
            color: var(--text-muted);
            margin-right: 12px;
            transition: color 0.2s ease;
        }

        a.menu-link:hover::before {
            color: var(--accent-gold-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PoE2 Index</h1>
        <ul>
            <li><a href="poe2actboss.html" class="menu-link">PoE2 アクトボスリスト</a></li>
            <li><a href="poe2mapboss.html" class="menu-link">PoE2 マップボスリスト</a></li>
            <li><a href="poe2memo.html" class="menu-link">PoE2 メモ・データ集</a></li>
            <li><a href="poe2jsoneditor.html" class="menu-link">PoE2 JSON Editor</a></li>
        </ul>
    </div>
</body>
</html>
